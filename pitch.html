<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PM•EMPLOI — Présentation Investisseur</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#06101E;--ink2:#0D1F38;--ink3:#162B4A;
  --blue:#1A3FC4;--blue2:#2D55E0;
  --gold:#C8973A;--gold2:#E5B04A;
  --white:#FFFFFF;--fog:#F0EDE8;
  --muted:#6B7A8D;--border:rgba(255,255,255,0.08);
  --red:#ED2939;--bleu:#002395;
  --green:#4ADE80;--cyan:#93C5FD;--amber:#FCD34D;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--ink)}
body{font-family:'DM Sans',sans-serif;color:var(--white)}

/* ── SLIDE WRAPPER ── */
#root{width:100vw;height:100vh;display:flex;flex-direction:column}
.deck{width:100%;height:100%;position:relative;overflow:hidden}
.slide{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  padding:0;
  opacity:0;pointer-events:none;
  transition:opacity 0.45s ease, transform 0.45s ease;
  transform:translateX(40px);
}
.slide.active{opacity:1;pointer-events:all;transform:translateX(0)}
.slide.prev{opacity:0;transform:translateX(-40px)}

/* ── NAV BAR ── */
.nav-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  height:52px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;
  background:rgba(6,16,30,0.95);
  backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
}
.nav-dots{display:flex;gap:8px;align-items:center}
.dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,0.2);
  transition:all 0.3s;cursor:pointer;border:none;
}
.dot.on{background:var(--gold);width:22px;border-radius:3px}
.nav-btns{display:flex;gap:10px;align-items:center}
.nav-btn{
  background:transparent;border:1px solid rgba(255,255,255,0.18);
  color:rgba(255,255,255,0.7);padding:7px 18px;border-radius:7px;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;transition:all 0.2s;
}
.nav-btn:hover{border-color:rgba(255,255,255,0.5);color:var(--white);background:rgba(255,255,255,0.06)}
.nav-btn.primary{background:var(--blue);border-color:var(--blue);color:var(--white)}
.nav-btn.primary:hover{background:var(--blue2)}
.slide-counter{font-size:12px;color:rgba(255,255,255,0.35);font-weight:500;min-width:60px;text-align:right}

/* ── TRICOLORE ── */
.tricolor{height:3px;background:linear-gradient(90deg,#002395 33.33%,#fff 33.33%,#fff 66.66%,#ED2939 66.66%);flex-shrink:0}

/* ── HEADER MINI ── */
.slide-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 40px;border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.logo-sm{display:flex;align-items:center;gap:9px;font-family:'DM Serif Display',serif;font-size:1rem;color:var(--white)}
.logo-icon{width:26px;height:26px;background:var(--blue);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif}
.logo-sm em{font-style:normal;color:var(--gold)}
.slide-tag{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.35)}

/* ── SLIDE BODY ── */
.slide-body{flex:1;overflow:hidden;padding:36px 40px 60px;display:flex;flex-direction:column}

/* ── TYPOGRAPHY ── */
.eyebrow{font-size:11px;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.slide-title{font-family:'DM Serif Display',serif;font-size:clamp(2rem,3.5vw,3.2rem);line-height:1.07;letter-spacing:-0.02em;margin-bottom:16px}
.slide-title em{font-style:italic;color:var(--gold)}
.slide-sub{font-size:1rem;line-height:1.7;color:rgba(255,255,255,0.5);max-width:560px}

/* ── STAT CARDS ── */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:28px}
.stat-card{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;padding:22px 24px}
.stat-num{font-family:'DM Serif Display',serif;font-size:2.6rem;line-height:1;letter-spacing:-0.03em;color:var(--white)}
.stat-num em{font-style:normal;color:var(--gold)}
.stat-lbl{font-size:13px;color:rgba(255,255,255,0.45);margin-top:7px;line-height:1.4}

/* ── PROBLEM CARDS ── */
.prob-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:28px;flex:1}
.prob-card{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:22px;border-left:3px solid transparent;transition:transform 0.2s}
.prob-card:hover{transform:translateX(4px)}
.prob-card.c1{border-color:#EF4444}.prob-card.c2{border-color:var(--gold)}.prob-card.c3{border-color:var(--blue)}.prob-card.c4{border-color:var(--green)}
.prob-card h4{font-weight:600;font-size:14px;color:var(--white);margin-bottom:8px}
.prob-card p{font-size:13px;color:rgba(255,255,255,0.45);line-height:1.6}

/* ── FEAT GRID ── */
.feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:28px;flex:1}
.feat-card{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;padding:22px}
.feat-card.featured{background:rgba(26,63,196,0.12);border-color:rgba(26,63,196,0.3)}
.feat-icon{font-size:22px;margin-bottom:12px}
.feat-card h3{font-weight:600;font-size:14px;color:var(--white);margin-bottom:8px}
.feat-card p{font-size:12.5px;color:rgba(255,255,255,0.45);line-height:1.6}
.feat-tag{display:inline-block;margin-top:12px;font-size:11px;font-weight:600;color:var(--gold);letter-spacing:0.05em}

/* ── ROI SECTION ── */
.roi-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;flex:1;margin-top:24px}
.roi-card{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;padding:24px}
.roi-big{font-family:'DM Serif Display',serif;font-size:2.4rem;letter-spacing:-0.03em;line-height:1;margin-bottom:6px}
.roi-lbl{font-size:12px;color:rgba(255,255,255,0.4);line-height:1.5}
.roi-highlight{background:rgba(200,151,58,0.1);border:1px solid rgba(200,151,58,0.2);border-radius:8px;padding:12px 16px;margin-top:14px}
.roi-highlight p{font-size:12px;color:rgba(255,255,255,0.55);line-height:1.6}
.roi-highlight strong{color:var(--gold)}

/* ── SLIDER ── */
.slider-wrap{margin:10px 0;display:flex;align-items:center;gap:12px}
.slider-wrap label{font-size:12px;color:rgba(255,255,255,0.4);min-width:160px}
.slider-wrap input[type=range]{flex:1;accent-color:var(--gold)}
.slider-val{font-size:13px;font-weight:600;color:var(--gold);min-width:60px;text-align:right}
.sim-result{background:rgba(200,151,58,0.08);border:1px solid rgba(200,151,58,0.18);border-radius:10px;padding:16px 20px;margin-top:16px;display:flex;gap:24px;align-items:center}
.sim-mrr{font-family:'DM Serif Display',serif;font-size:2rem;color:var(--green);letter-spacing:-0.02em}
.sim-detail{font-size:12px;color:rgba(255,255,255,0.4);line-height:1.7}

/* ── PROJECTIONS ── */
.proj-header{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,0.5)}
.legend-sq{width:10px;height:10px;border-radius:2px}

/* ── COMP TABLE ── */
.comp-table{margin-top:20px;border-radius:12px;overflow:hidden;border:1px solid var(--border);flex:1}
.comp-row{display:grid;grid-template-columns:2.2fr 1fr 1fr 1fr 1fr;gap:0;padding:11px 18px;font-size:13px;align-items:center}
.comp-row.head{background:rgba(255,255,255,0.04);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.3);border-bottom:1px solid var(--border)}
.comp-row.body{border-bottom:1px solid rgba(255,255,255,0.04);color:rgba(255,255,255,0.4)}
.comp-row.ours{background:rgba(26,63,196,0.15);color:rgba(255,255,255,0.9);font-weight:600;border:none}
.cy{color:var(--green)}.cn{color:rgba(255,255,255,0.2)}

/* ── TARIFS ── */
.plans-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:24px;flex:1}
.plan-card{border-radius:14px;padding:20px;display:flex;flex-direction:column;transition:transform 0.2s}
.plan-card:hover{transform:translateY(-4px)}
.plan-price{font-family:'DM Serif Display',serif;font-size:2rem;line-height:1;letter-spacing:-0.02em;margin-bottom:4px}
.plan-name{font-weight:600;font-size:13px;margin-bottom:8px}
.plan-cible{font-size:11px;opacity:0.7;margin-bottom:12px;flex:1}
.plan-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:5px;margin-top:auto}

/* ── SORTIE ── */
.exit-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:22px}
.exit-card{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;padding:20px;border-top:3px solid}
.exit-nom{font-weight:600;font-size:14px;color:var(--white);margin-bottom:4px}
.exit-profil{font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:10px}
.exit-desc{font-size:12px;color:rgba(255,255,255,0.45);line-height:1.6;margin-bottom:12px}
.exit-footer{display:flex;justify-content:space-between;align-items:center}
.exit-timing{font-size:11px;color:rgba(255,255,255,0.3)}
.proba{font-size:11px;font-weight:600;padding:3px 9px;border-radius:5px}

/* ── CTA SLIDE ── */
.cta-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:20px;position:relative}
.cta-glow{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(26,63,196,0.18) 0%,transparent 60%);pointer-events:none}
.cta-title{font-family:'DM Serif Display',serif;font-size:clamp(2.4rem,4vw,3.8rem);line-height:1.06;letter-spacing:-0.03em}
.cta-title em{font-style:italic;color:var(--gold)}
.cta-sub{font-size:1.05rem;color:rgba(255,255,255,0.45);max-width:500px;line-height:1.7}
.cta-contact{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.cta-btn{font-weight:700;font-size:0.9rem;padding:13px 28px;border-radius:10px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:all 0.2s}
.cta-btn.main{background:var(--blue);color:var(--white);box-shadow:0 4px 20px rgba(26,63,196,0.4)}
.cta-btn.main:hover{background:var(--blue2);transform:translateY(-2px)}
.cta-btn.ghost{background:transparent;color:var(--white);border:1px solid rgba(255,255,255,0.2)}
.cta-btn.ghost:hover{border-color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.05)}

/* ── ANIMATIONS ── */
@keyframes fu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu 0.55s ease forwards;opacity:0}
.d1{animation-delay:0.05s}.d2{animation-delay:0.15s}.d3{animation-delay:0.25s}
.d4{animation-delay:0.35s}.d5{animation-delay:0.45s}.d6{animation-delay:0.55s}

/* keyboard hint */
.kb-hint{font-size:11px;color:rgba(255,255,255,0.2);display:flex;align-items:center;gap:6px}
.kb{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:4px;padding:2px 6px;font-size:10px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SLIDES = [
  "Couverture",
  "Le problème",
  "La solution",
  "Différenciateurs",
  "ROI collectivité",
  "Projections MRR",
  "Tarifs",
  "Scénarios de sortie",
  "Conclusion",
];

function Header({ tag }) {
  return (
    <div className="slide-header">
      <div className="logo-sm">
        <div className="logo-icon">PM</div>
        PM•<em>EMPLOI</em>
      </div>
      <span className="slide-tag">{tag}</span>
    </div>
  );
}

/* ── SLIDE 0 : COUVERTURE ── */
function SlideCouverture() {
  return (
    <div className="slide-body" style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",gap:0,paddingBottom:80}}>
      <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 50% 20%,rgba(26,63,196,0.2) 0%,transparent 60%)",pointerEvents:"none"}} />
      <div style={{position:"absolute",fontFamily:"'DM Serif Display',serif",fontSize:"clamp(180px,22vw,280px)",color:"rgba(255,255,255,0.025)",bottom:"-4%",right:"-2%",lineHeight:1,letterSpacing:"-0.05em",pointerEvents:"none",userSelect:"none"}}>29k</div>

      <div className="fu d1" style={{display:"inline-flex",alignItems:"center",gap:7,fontSize:11,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--gold)",background:"rgba(200,151,58,0.1)",border:"1px solid rgba(200,151,58,0.2)",padding:"5px 14px",borderRadius:100,marginBottom:28}}>
        <span style={{width:5,height:5,borderRadius:"50%",background:"var(--gold)",display:"inline-block"}} />
        Présentation investisseur · 2026
      </div>

      <h1 className="fu d2" style={{fontFamily:"'DM Serif Display',serif",fontSize:"clamp(3rem,5.5vw,5rem)",lineHeight:1.05,letterSpacing:"-0.03em",marginBottom:24,position:"relative"}}>
        La mobilité de la<br/><em style={{fontStyle:"italic",color:"var(--gold)"}}>Police Municipale</em><br/>enfin centralisée
      </h1>

      <p className="fu d3" style={{fontSize:"1.05rem",color:"rgba(255,255,255,0.45)",maxWidth:500,lineHeight:1.7,marginBottom:40}}>
        PM•EMPLOI — première bourse nationale dédiée aux policiers municipaux.
        Agrégation des offres, réglementation intégrée, ROI immédiat.
      </p>

      <div className="fu d4" style={{display:"flex",gap:16,flexWrap:"wrap",justifyContent:"center"}}>
        <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid var(--border)",borderRadius:12,padding:"14px 22px",textAlign:"center"}}>
          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:"2rem",color:"var(--white)",letterSpacing:"-0.02em"}}>29<span style={{color:"var(--gold)"}}>k</span></div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",marginTop:4}}>agents en poste</div>
        </div>
        <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid var(--border)",borderRadius:12,padding:"14px 22px",textAlign:"center"}}>
          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:"2rem",color:"var(--white)",letterSpacing:"-0.02em"}}>4<span style={{color:"var(--gold)"}}>k+</span></div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",marginTop:4}}>postes vacants</div>
        </div>
        <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid var(--border)",borderRadius:12,padding:"14px 22px",textAlign:"center"}}>
          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:"2rem",color:"var(--white)",letterSpacing:"-0.02em"}}>11<span style={{color:"var(--gold)"}}>k</span></div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",marginTop:4}}>recrutements 2026</div>
        </div>
        <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid var(--border)",borderRadius:12,padding:"14px 22px",textAlign:"center"}}>
          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:"2rem",color:"var(--white)",letterSpacing:"-0.02em"}}>100<span style={{color:"var(--gold)"}}>+</span></div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",marginTop:4}}>canaux dispersés</div>
        </div>
      </div>

      <div className="fu d5" style={{marginTop:36,fontSize:12,color:"rgba(255,255,255,0.2)"}}>
        CAPDIM · contact@capdim.fr · capdimsas-sudo.github.io/pm-emploi
      </div>
    </div>
  );
}

/* ── SLIDE 1 : PROBLÈME ── */
function SlideProbleme() {
  return (
    <div className="slide-body">
      <div className="eyebrow fu d1">Le problème du marché</div>
      <h2 className="slide-title fu d2">Un marché <em>fragmenté</em>,<br/>aucune bourse nationale</h2>
      <p className="slide-sub fu d3">Contrairement à la Police Nationale, la police municipale ne dispose d'aucun système centralisé. Chaque commune publie ses vacances de façon autonome.</p>
      <div className="prob-grid" style={{marginTop:22}}>
        {[
          {c:"c1",icon:"🗂",t:"100+ canaux dispersés",d:"CDG départementaux, Gazette des communes, sites communaux… Aucun point d'entrée unique. Les agents ne trouvent pas les offres qui leur correspondent."},
          {c:"c2",icon:"⏳",t:"6 mois de vacance en zone tendue",d:"Délai moyen documenté par les auditions du Sénat (2024). Coût estimé : 22 500 € de masse salariale non travaillée par poste vacant."},
          {c:"c3",icon:"⚖️",t:"Réglementation ignorée partout",d:"Engagement de servir (10 877 €), priorités légales de mutation, distinction employeur/lieu d'exercice — aucune plateforme généraliste ne gère ces contraintes."},
          {c:"c4",icon:"🏛",t:"Employeur ≠ lieu d'exercice",d:"Un agent EPCI ou syndicat a un interlocuteur différent pour muter (président EPCI, bureau syndical). Aucun outil ne modélise cette distinction critique."},
        ].map((f,i)=>(
          <div key={i} className={`prob-card ${f.c} fu d${i+3}`}>
            <h4>{f.icon}  {f.t}</h4>
            <p>{f.d}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── SLIDE 2 : SOLUTION ── */
function SlideSolution() {
  return (
    <div className="slide-body">
      <div className="eyebrow fu d1">La solution</div>
      <h2 className="slide-title fu d2">PM•EMPLOI — la seule plateforme<br/><em>conçue pour la réglementation PM</em></h2>
      <div className="feat-grid">
        {[
          {icon:"🔍",t:"Agrégation nationale",d:"Toutes les offres PM de France — communes, EPCI, syndicats, CDG — centralisées et mises à jour quotidiennement.",tag:"Agents & Lauréats"},
          {icon:"⚡",t:"Matching réglementaire",d:"Calcul automatique de l'éligibilité, de l'engagement de servir restant et des priorités légales pour chaque profil.",tag:"Différenciateur clé",feat:true},
          {icon:"🆓",t:"Modèle freemium",d:"Compte gratuit sans CB pour tous. Mairies publient leurs annonces librement. L'abonnement s'active uniquement pour accéder aux profils agents.",tag:"Acquisition sans friction"},
          {icon:"🛡️",t:"Consentement avant déverrouillage",d:"L'agent est notifié et dispose de 48h pour accepter ou refuser. Crédit restitué si refus. Log horodaté RGPD consultable à tout moment.",tag:"Protection RGPD"},
          {icon:"🔒",t:"Exclusion employeur actuel",d:"Un agent n'est jamais visible par sa commune ou son CDG départemental. Règle technique non contournable — confiance totale des agents.",tag:"Anonymat garanti"},
          {icon:"🏛",t:"Interlocuteur identifié",d:"L'app identifie automatiquement le bon destinataire : maire, président d'EPCI ou bureau syndical selon la structure juridique.",tag:"Procédures"},
        ].map((f,i)=>(
          <div key={i} className={`feat-card fu d${i+2} ${f.feat?"featured":""}`}>
            <div className="feat-icon">{f.icon}</div>
            <h3>{f.t}</h3>
            <p>{f.d}</p>
            <span className="feat-tag">{f.tag} →</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── SLIDE 3 : DIFFÉRENCIATEURS ── */
function SlideDiff() {
  return (
    <div className="slide-body">
      <div className="eyebrow fu d1">Avantage concurrentiel</div>
      <h2 className="slide-title fu d2">Ce qu'<em>aucun concurrent</em><br/>ne fait aujourd'hui</h2>
      <div className="comp-table fu d3" style={{flex:1}}>
        <div className="comp-row head">
          <span>Plateforme</span><span>Tarif mairie</span><span>100% PM</span><span>Alertes légales</span><span>Anonymat</span>
        </div>
        {[
          ["emploi-territorial.fr","Gratuit",false,false,false],
          ["Gazette des Communes","Élevé",false,false,false],

];

  "Couverture","Le problème","La solution","Avantages concurrentiels",
  "ROI collectivité","Projections MRR","Modèle tarifaire","Scénarios de sortie","Contact & démo"
];

const BG_STYLES = [
  {background:"var(--ink)"},
  {background:"var(--ink)"},
  {background:"var(--ink2)"},
  {background:"var(--ink)"},
  {background:"var(--ink2)"},

];

function App() {
  const [cur, setCur] = useState(0);
  const [prev, setPrev] = useState(null);
  const total = SLIDES.length;

  const go = (n) => {
    if(n < 0 || n >= total) return;
    setPrev(cur);
    setCur(n);
    setTimeout(()=>setPrev(null), 500);
  };

  useEffect(()=>{
    const onKey = (e) => {
      if(e.key==="ArrowRight"||e.key==="ArrowDown"||e.key===" ") { e.preventDefault(); go(cur+1); }
      if(e.key==="ArrowLeft"||e.key==="ArrowUp") { e.preventDefault(); go(cur-1); }
    };
    window.addEventListener("keydown", onKey);
    return ()=>window.removeEventListener("keydown", onKey);
  }, [cur]);

  return (
    <>
      <div className="tricolor"/>
      <div className="deck" style={BG_STYLES[cur]}>
        {SLIDE_COMPONENTS.map((SlideComp, i) => (
          <div
            key={i}
            className={`slide ${i===cur?"active":""} ${i===prev?"prev":""}`}
            style={BG_STYLES[i]}
          >
            {i !== 0 && i !== total-1 && <Header tag={SLIDE_TAGS[i]}/>}
            <SlideComp />
          </div>
        ))}
      </div>
      <div className="nav-bar">
        <div className="kb-hint">
          <span className="kb">←</span><span className="kb">→</span>
          <span style={{marginLeft:4}}>ou clic pour naviguer</span>
        </div>
        <div className="nav-dots">
          {SLIDES.map((_,i)=>(
            <button key={i} className={`dot ${i===cur?"on":""}`} onClick={()=>go(i)} title={SLIDES[i]}/>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span className="slide-counter">{cur+1} / {total}</span>
          <button className="nav-btn" onClick={()=>go(cur-1)} disabled={cur===0} style={{opacity:cur===0?0.3:1}}>← Précédent</button>
          <button className={`nav-btn ${cur<total-1?"primary":""}`} onClick={()=>go(cur+1)} disabled={cur===total-1} style={{opacity:cur===total-1?0.3:1}}>
            {cur<total-1?"Suivant →":"Fin"}
          </button>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
