// Calcul engagement de servir (max 3 ans depuis titularisation)
const engagementRestant = (dateTitularisation, engagementSigne) => {
  if (engagementSigne !== "Oui" || !dateTitularisation) return null;
  const tit = new Date(dateTitularisation);
  const fin = new Date(tit); fin.setFullYear(fin.getFullYear() + 3);
  const now = new Date();
  if (now >= fin) return null; // engagement expiré
  const moisRestants = Math.ceil((fin - now) / (1000 * 60 * 60 * 24 * 30));
  // barème dégressif 10 877€ sur 3 ans (36 mois)
  const totalMois = 36;
  const moisPassés = totalMois - moisRestants;
  const rembPct = Math.max(0, 1 - moisPassés / totalMois);
  const remb = Math.round(10877 * rembPct);
  return { fin, moisRestants, remb };
};

    setLoginError("");

    if (!compte) { setLoginError("Email ou code incorrect — vérifiez vos identifiants"); return; }
    setUserType(compte.type);
    setUserConnecte(true);
    setUserProfil(compte);
    setLoginEmail(""); setLoginCode(""); setMdpVisible(false);

      setMairieStatut("verifie");
      const ab = ABONNEMENTS.find(a => a.id === compte.abonnementId);
      if (ab) { setAbonnement(ab); setContactsRestants(compte.quotaRestant || (ab.illimite ? 9999 : ab.contactsMois)); }

  // ── Calcul du temps restant sur une demande de consentement ─────────────
  const tempsRestant = (dateRequete) => {
    const ecoulé = (Date.now() - new Date(dateRequete).getTime()) / 3600000;
    const restant = Math.max(0, DELAI_H - ecoulé);
    if (restant <= 0) return null;
    if (restant < 1) return `${Math.round(restant * 60)} min`;
    return `${Math.round(restant)}h`;
  };

  // ── Déverrouillage → crée une demande de consentement ───────────────────
  const deverrouiller = (id) => {
    if (!mairieStatut)               { setModal({ type:"non_verifiee" }); return; }
    if (mairieStatut !== "verifie")  { setModal({ type:"non_abonne" }); return; }
    if (!abonnement)                 { setModal({ type:"abonnement" }); return; }
    if (contactsRestants <= 0)       { notify("Quota mensuel atteint — renouvellement le 1er du mois.", "error"); return; }
    // Demande déjà en cours pour ce profil ?
    const existante = demandesConsentement.find(d => d.officerId === id && d.statut === "en_attente");
    if (existante) { notify("Une demande est déjà en attente pour ce profil.", "error"); return; }
    // Crée la demande — le crédit est réservé (pas encore consommé)
    const nouvelleDemande = {
      id: `dc${Date.now()}`,
      officerId: id,
      mairieNom: userProfil?.commune ? `Mairie de ${userProfil.commune}` : "Collectivité",
      mairíeDept: userProfil?.dept || "",
      dateRequete: new Date().toISOString(),
      statut: "en_attente",
      creditReserve: 1,
    };
    setDemandesConsentement(p => [...p, nouvelleDemande]);
    // Réserver le crédit (décompté mais pas définitif)
    if (!abonnement.illimite) setContactsRestants(c => c - 1);
    notify(`✉️ Demande envoyée à l'agent — réponse attendue sous ${DELAI_H}h. Crédit réservé.`);
  };

  // ── Réponse de l'agent au consentement ──────────────────────────────────
  const repondreConsentement = (demandeId, decision) => {
    setDemandesConsentement(p => p.map(d => d.id === demandeId
      ? { ...d, statut: decision, dateReponse: new Date().toISOString() }
      : d
    ));
    if (decision === "accepte") {
      const demande = demandesConsentement.find(d => d.id === demandeId);
      if (demande) setUnlocked(prev => new Set([...prev, demande.officerId]));
      notify("✅ Accès accordé — la mairie peut voir vos coordonnées.");
    } else {
      // Refus → restituer le crédit réservé (en démo : simple notification)
      notify("❌ Accès refusé — le crédit sera restitué à la mairie.");
    }
  };

  const sauvegarderPolicier = () => {
    if (!newOfficer.nom || !newOfficer.prenom || !newOfficer.email) { notify("Champs obligatoires manquants", "error"); return; }
    const cat = GRADES_CAT[newOfficer.grade] || "C";
    setOfficers(p => [{ ...newOfficer, id: p.length+1, categorie: cat, contact:`${newOfficer.email} | ${newOfficer.tel}`, annees: parseInt(newOfficer.annees)||0 }, ...p]);
    setView("policiers");
    notify("Profil créé ! Votre identité est anonymisée sur la plateforme.");
  };

  const soumettreMailrie = () => {
    if (!newMairie.commune || !newMairie.siret || !newMairie.email || !newMairie.nomContact || !newMairie.fonction) { notify("Champs obligatoires manquants","error"); return; }
    if (isBadEmail(newMairie.email)) { notify("Email non institutionnel refusé","error"); return; }
    if (newMairie.siret.length !== 14) { notify("SIRET doit comporter 14 chiffres","error"); return; }
    setDemandes(p => [{ ...newMairie, id:`m${p.length+1}`, date: new Date().toLocaleDateString("fr-FR"), statut:"en_attente" }, ...p]);
    // Compte créé → niveau "compte" : peut publier des annonces immédiatement
    setMairieStatut("compte");
    setRole(null); setView("accueil");
    notify("✅ Compte créé — vous pouvez publier des annonces. Accès aux profils PM après validation sous 48h.");
  };

  const publierAnnonce = () => {
    if (!newAnnonce.commune || !newAnnonce.urgence) { notify("Champs obligatoires manquants","error"); return; }
    setAnnonces(p => [{ ...newAnnonce, id: p.length+1, besoin: parseInt(newAnnonce.besoin)||1, date: new Date().toLocaleDateString("fr-FR") }, ...p]);
    setRole(null); setView("annonces");
    notify("Annonce publiée avec succès !");
  };

  const validerMairie = (id) => {
    setDemandes(p => p.map(d => d.id===id ? { ...d, statut:"validee" } : d));
    setMairieStatut("verifie");
    notify("Mairie validée — accès complet aux profils PM activé.");
  };

  const rejeterMairie = (id) => {
    if (!motifRejet) { notify("Saisissez un motif","error"); return; }
    setDemandes(p => p.map(d => d.id===id ? { ...d, statut:"rejetee", motifRejet } : d));
    setMotifRejet(""); setModal(null);
    notify("Demande rejetée.","error");
  };

  const toggleArr = (arr, val) => arr.includes(val) ? arr.filter(x => x!==val) : [...arr, val];

  // ── Règle 1 — Exclusion automatique employeur actuel ─────────────────────
  // Extrait le code département depuis une chaîne type "Montpellier (34)" ou "Hérault (34)"
  const getDept = (str) => (str||"").match(/\((\d+)\)/)?.[1] || null;

  const isVisiblePour = (officer, profil, type) => {
    // Lauréat de concours : pas d'employeur → toujours visible
    if (officer.statut === "laureat") return true;
    // Si l'agent connecté consulte sa propre liste : son toggle prime
    const effectiveAutorisation = (userType === "pm" && userProfil)
      ? autorisationEmployeur  // toggle live du dashboard PM
      : officer.autorisationEmployeur;  // valeur stockée dans le mock
    if (effectiveAutorisation) return true;
    if (!profil || !type) return true; // visiteur non connecté
    const deptAgent = getDept(officer.commune);
    if (!deptAgent) return true;
    if (type === "mairie") {
      const deptMairie = getDept(profil.dept);
      if (deptMairie && deptMairie === deptAgent) return false;
    }
    if (type === "cdg") {
      const deptCdg = getDept(profil.dept);
      if (deptCdg && deptCdg === deptAgent) return false;
    }
    return true;
  };

  const filteredOfficers = officers.filter(o => {
    const rOk = filterRegion === "Toutes" || (o.regions||[]).includes(filterRegion);
    const dOk = filterDispo  === "Toutes" || o.dispo === filterDispo;
    const cOk = filterCat    === "Toutes" || (GRADES_CAT[o.grade] || "C") === filterCat;
    const sOk = filterStatut === "Tous"   || (filterStatut === "laureat" ? o.statut === "laureat" : o.statut === "titulaire");
    const vOk = isVisiblePour(o, userProfil, userType);
    // Bug 1 — exclure l'agent connecté s'il est en mode veille passive
    const veille = userType === "pm" && userProfil && modeRecherche === "veille"
      && o.email === userProfil.contact?.split(" | ")[0];
    return rOk && dOk && cOk && sOk && vOk && !veille;
  });

  const enAttente = demandes.filter(d => d.statut === "en_attente").length;

  // ─── Styles inline partagés ──────────────────────────────────────────────
  const S = {
    btnP: { background:"linear-gradient(135deg,#1D4ED8,#1E40AF)", color:"white", border:"none", padding:"10px 22px", borderRadius:8, fontFamily:"Barlow,sans-serif", fontWeight:600, fontSize:14, cursor:"pointer", transition:"all .2s" },
    btnG: { background:"transparent", color:"#94A3B8", border:"1px solid #1E3A5F", padding:"9px 20px", borderRadius:8, fontFamily:"Barlow,sans-serif", fontWeight:500, fontSize:14, cursor:"pointer" },
    btnOk: { background:"linear-gradient(135deg,#059669,#047857)", color:"white", border:"none", padding:"8px 18px", borderRadius:8, fontFamily:"Barlow,sans-serif", fontWeight:600, fontSize:13, cursor:"pointer" },
    btnErr:{ background:"linear-gradient(135deg,#DC2626,#B91C1C)", color:"white", border:"none", padding:"8px 18px", borderRadius:8, fontFamily:"Barlow,sans-serif", fontWeight:600, fontSize:13, cursor:"pointer" },
    card:  { background:"#0D1A2E", border:"1px solid #1A2E4A", borderRadius:12 },
    inp:   { background:"#0A1628", border:"1px solid #1E3A5F", color:"#E2E8F0", padding:"10px 14px", borderRadius:8, fontFamily:"Barlow,sans-serif", fontSize:14, width:"100%", outline:"none" },
    chip:  (bg,color,border) => ({ display:"inline-flex", alignItems:"center", gap:4, padding:"3px 9px", borderRadius:20, fontSize:11, fontWeight:600, background:bg, color, border:`1px solid ${border||bg}` }),
    tag:   (sel) => ({ padding:"5px 10px", borderRadius:20, fontSize:11, fontWeight:600, cursor:"pointer", border:`1px solid ${sel?"#2D5A8E":"#1E3A5F"}`, background:sel?"#1E3A5F":"#0A1628", color:sel?"#60A5FA":"#64748B" }),
    navlink:(act) => ({ cursor:"pointer", padding:"6px 14px", borderRadius:6, fontWeight:500, fontSize:14, color:act?"#60A5FA":"#8FA3BB", background:act?"#1E3A5F":"transparent" }),
  };

  const FR = { display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:14 };

  return (
    <div style={{ fontFamily:"'Barlow',sans-serif", background:"#070D1A", minHeight:"100vh", color:"#E8ECF0" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@700;800&display=swap');
        * { box-sizing:border-box; margin:0; padding:0; }
        ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:#0D1525} ::-webkit-scrollbar-thumb{background:#1E3A5F;border-radius:3px}
        input,select,textarea{background:#0A1628;border:1px solid #1E3A5F;color:#E2E8F0;padding:10px 14px;border-radius:8px;font-family:'Barlow',sans-serif;font-size:14px;width:100%;outline:none}
        input:focus,select:focus,textarea:focus{border-color:#3B82F6}
        input::placeholder,textarea::placeholder{color:#4A6080}
        select option{background:#0D1A2E}
        label{font-size:13px;color:#8FA3BB;font-weight:500;display:block;margin-bottom:5px}
        .overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
        .modal{background:#0D1A2E;border:1px solid #1E3A5F;border-radius:16px;padding:32px;max-width:600px;width:90%;max-height:88vh;overflow-y:auto}
        .toast{position:fixed;bottom:24px;right:24px;z-index:200;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:500;max-width:380px}
        .tricolor{height:3px;background:linear-gradient(90deg,#002395 33.33%,white 33.33%,white 66.66%,#ED2939 66.66%)}
        .ab-card{border:2px solid transparent;border-radius:14px;padding:20px;transition:all .2s;cursor:pointer;background:#0A1628}
        .ab-card:hover{transform:translateY(-3px)}
        @media(max-width:600px){.fr2{grid-template-columns:1fr!important}}
      `}</style>

      <div className="tricolor" />

      {/* ── HEADER ────────────────────────────────────────────────── */}
      <header style={{ background:"#070D1A", borderBottom:"1px solid #1A2E4A", padding:"0 24px", position:"sticky", top:0, zIndex:50 }}>
        <div style={{ maxWidth:1120, margin:"0 auto", height:58, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          {/* Logo */}
          <div style={{ display:"flex", alignItems:"center", gap:12, cursor:"pointer" }} onClick={()=>setView("accueil")}>
            <div style={{ width:36, height:36, background:"linear-gradient(135deg,#1D4ED8,#1E40AF)", borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>🛡️</div>
            <div>
              <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:17, fontWeight:800, color:"#E2E8F0", lineHeight:1 }}>PM•EMPLOI</div>
              <div style={{ fontSize:10, color:"#4A6080", letterSpacing:"1.5px" }}>POLICE MUNICIPALE</div>
            </div>
          </div>
          {/* Nav centrale */}
          <nav style={{ display:"flex", gap:2, alignItems:"center" }}>
            {[["accueil","🏠"],["policiers","👮 Policiers"],["annonces","📋 Annonces"],["tarifs","💳 Tarifs"]].map(([v,l])=>(
              <div key={v} style={S.navlink(view===v)} onClick={()=>naviguer(v)}>{l}</div>
            ))}
            {userConnecte && userType==="pm"    && <div style={{...S.navlink(view==="dashboard_pm"),    color:view==="dashboard_pm"   ?"#60A5FA":"#8FA3BB"}} onClick={()=>naviguer("dashboard_pm")}>   👮 Mon espace</div>}
            {userConnecte && userType==="mairie" && <div style={{...S.navlink(view==="dashboard_mairie"),color:view==="dashboard_mairie"?"#4ade80":"#8FA3BB"}} onClick={()=>naviguer("dashboard_mairie")}>🏛️ Mon espace</div>}
            {userConnecte && userType==="cdg"    && <div style={{...S.navlink(view==="dashboard_cdg"),  color:view==="dashboard_cdg"  ?"#c084fc":"#8FA3BB"}} onClick={()=>naviguer("dashboard_cdg")}>  🗺️ Mon espace</div>}
            <div style={{ ...S.navlink(view==="admin"), color:view==="admin"?"#F59E0B":"#4A6080", position:"relative" }} onClick={()=>naviguer("admin")}>
              ⚙️
              {enAttente > 0 && <span style={{ position:"absolute", top:2, right:2, width:7, height:7, background:"#EF4444", borderRadius:"50%", border:"1px solid #070D1A" }} />}
            </div>
          </nav>
          {/* Droite : état session */}
          <div style={{ display:"flex", gap:8, alignItems:"center" }}>
            {userConnecte ? (
              <>
                {abonnement && <div style={S.chip("#052e16","#4ade80","#14532d")}>{abonnement.label} {abonnement.illimite?"·∞":`· ${contactsRestants}`}</div>}
                {!abonnement && mairieStatut==="compte" && <div style={S.chip("#1c1006","#fbbf24","#78350f")}>⏳ Vérification en attente</div>}
                <div style={S.chip("#1E3A5F","#93C5FD","#2D5A8E")}>
                  {({pm:"👮",mairie:"🏛️",cdg:"🗺️",admin:"⚙️"})[userType]} {userProfil?.prenom || userProfil?.commune || userProfil?.nom}
                </div>
                <button style={{ ...S.btnG, fontSize:12, padding:"6px 14px" }} onClick={handleDeconnexion}>Déconnexion</button>
              </>
            ) : (
              <>
                <button style={{ ...S.btnG, fontSize:13 }} onClick={()=>{setRole("policier");setView("inscription")}}>👮 Inscription PM</button>
                <button style={{ ...S.btnP, fontSize:13 }} onClick={()=>setModal({type:"connexion"})}>🔑 Connexion</button>
              </>
            )}
          </div>
        </div>
      </header>

      {notif && <div className="toast" style={{ background:notif.type==="error"?"#450a0a":"#052e16", border:`1px solid ${notif.type==="error"?"#7f1d1d":"#14532d"}`, color:notif.type==="error"?"#fca5a5":"#86efac" }}>
        {notif.type==="error"?"⚠️":"✅"} {notif.msg}
      </div>}

      <main style={{ maxWidth:1120, margin:"0 auto", padding:"0 24px 60px" }}>

        {/* ══ ACCUEIL ══════════════════════════════════════════════ */}
        {view==="accueil" && <div>
          <div style={{ textAlign:"center", padding:"68px 24px 52px", background:"radial-gradient(ellipse at 50% 0%,rgba(29,78,216,.14) 0%,transparent 60%)", borderBottom:"1px solid #1A2E4A" }}>
            <div style={{ display:"inline-flex", gap:8, background:"#0D1A2E", border:"1px solid #1E3A5F", borderRadius:20, padding:"4px 16px", fontSize:12, color:"#60A5FA", marginBottom:22, fontWeight:700, letterSpacing:"1px" }}>
              ⚡ PLATEFORME NATIONALE — ACCÈS SÉCURISÉ — ABONNEMENT MENSUEL
            </div>
            <h1 style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:"clamp(40px,7vw,68px)", fontWeight:800, lineHeight:1.05, letterSpacing:"-1px", marginBottom:18 }}>
              La mobilité de la<br /><span style={{ color:"#3B82F6" }}>Police Municipale</span>
            </h1>
            <p style={{ fontSize:16, color:"#8FA3BB", maxWidth:540, margin:"0 auto 20px", lineHeight:1.7 }}>
              Agents anonymisés · Mairies officiellement vérifiées · Alertes légales (engagement de servir, priorités de mutation)
            </p>
            <div style={{ display:"inline-flex", gap:20, background:"#0D1A2E", border:"1px solid #1A2E4A", borderRadius:12, padding:"12px 28px", marginBottom:32, flexWrap:"wrap", justifyContent:"center" }}>
              {["🔒 Anonymat agents","✅ Mairies vérifiées","⚖️ Alertes légales","💳 Abonnement mensuel"].map(t=>(
                <span key={t} style={{ fontSize:13, color:"#60A5FA", fontWeight:600 }}>{t}</span>
              ))}
            </div>
            <div style={{ display:"flex", gap:12, justifyContent:"center", flexWrap:"wrap" }}>
              <button style={{ ...S.btnP, padding:"13px 28px", fontSize:15 }} onClick={()=>setModal({type:"connexion", defaut:"pm"})}>👮 Je suis policier municipal</button>
              <button style={{ ...S.btnG, padding:"13px 28px", fontSize:15, borderColor:"#2D5A8E" }} onClick={()=>setModal({type:"connexion", defaut:"mairie"})}>🏛️ Je représente une mairie / CDG</button>
            </div>
          </div>

          {/* Piliers sécurité */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(250px,1fr))", gap:16, padding:"36px 0 24px" }}>
            {[
              { color:"#3B82F6", icon:"🔒", titre:"Anonymat total", texte:"Noms masqués (M. D***t). Coordonnées chiffrées. Déverrouillage uniquement pour mairies vérifiées avec abonnement actif." },
              { color:"#F59E0B", icon:"🏛️", titre:"Vérification mairies", texte:"SIRET + email institutionnel + justificatif officiel + type d'employeur (Commune, EPCI, Syndicat, CDG). Validation manuelle 48h." },
              { color:"#10B981", icon:"⚖️", titre:"Alertes légales métier", texte:"Engagement de servir (10 877 €), priorités légales (conjoint, RQTH, aidant), préavis 3 mois, assermentation PN/Gendarmerie." },
              { color:"#8B5CF6", icon:"💳", titre:"Abonnement mensuel", texte:"Dès 29€/mois. Renouvellement automatique. 2 mois offerts au paiement annuel. Résiliation à tout moment." },
            ].map(({color,icon,titre,texte})=>(
              <div key={titre} style={{ ...S.card, padding:20, borderLeft:`3px solid ${color}` }}>
                <div style={{ fontSize:26, marginBottom:10 }}>{icon}</div>
                <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:17, fontWeight:700, color:"#E2E8F0", marginBottom:8 }}>{titre}</div>
                <p style={{ fontSize:13, color:"#64748B", lineHeight:1.7 }}>{texte}</p>
              </div>
            ))}
          </div>

          {/* Stats */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))", gap:14, paddingBottom:40 }}>
            {[["🛡️",officers.length,"Agents inscrits"],["📋",annonces.length,"Annonces actives"],["✅",demandes.filter(d=>d.statut==="validee").length,"Mairies vérifiées"],["⚡","48h","Délai vérification"]].map(([icon,val,lab])=>(
              <div key={lab} style={{ background:"linear-gradient(135deg,#0D1A2E,#0A1628)", border:"1px solid #1A2E4A", borderRadius:12, padding:"18px", textAlign:"center" }}>
                <div style={{ fontSize:22, marginBottom:6 }}>{icon}</div>
                <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:32, fontWeight:800, color:"#60A5FA" }}>{val}</div>
                <div style={{ fontSize:12, color:"#4A6080", marginTop:4 }}>{lab}</div>
              </div>
            ))}
          </div>
        </div>}

        {/* ══ POLICIERS ════════════════════════════════════════════ */}
        {view==="policiers" && <div style={{ paddingTop:36 }}>
          <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:14, flexWrap:"wrap", gap:12 }}>
            <div>
              <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:28, fontWeight:800 }}>Policiers disponibles</div>
              <p style={{ color:"#4A6080", fontSize:13, marginTop:4 }}>{filteredOfficers.length} profil(s) — identités anonymisées</p>
            </div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
              {[
                ["Toutes régions",...REGIONS.map(r=>r)],
              ].map(() => null)}
              <select value={filterRegion} onChange={e=>setFilterRegion(e.target.value)} style={{ width:"auto", fontSize:12, padding:"7px 10px" }}>
                <option value="Toutes">Toutes régions</option>
                {REGIONS.map(r=><option key={r}>{r}</option>)}
              </select>
              <select value={filterDispo} onChange={e=>setFilterDispo(e.target.value)} style={{ width:"auto", fontSize:12, padding:"7px 10px" }}>
                <option value="Toutes">Toutes dispo</option>
                <option>Immédiate</option><option>1 mois</option><option>3 mois</option><option>6 mois</option>
              </select>
              <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={{ width:"auto", fontSize:12, padding:"7px 10px" }}>
                <option value="Toutes">Cat. A/B/C</option>
                <option value="A">Cat. A — Directeur</option>
                <option value="B">Cat. B — Chef de service</option>
                <option value="C">Cat. C — Gardien / Brigadier</option>
              </select>
              <select value={filterStatut} onChange={e=>setFilterStatut(e.target.value)} style={{ width:"auto", fontSize:12, padding:"7px 10px" }}>
                <option value="Tous">Titulaires + Lauréats</option>
                <option value="titulaire">Titulaires en mutation</option>
                <option value="laureat">Lauréats (1er poste)</option>
              </select>
              <button style={{ ...S.btnP, fontSize:12 }} onClick={()=>mairieStatut?setModal({type:"abonnement"}):setModal({type:"non_verifiee"})}>💳 Abonnement</button>
            </div>
          </div>

          {/* Bandeau info */}
          <div style={{ background:"#0A1220", border:"1px solid #1E3A5F", borderRadius:10, padding:"10px 16px", marginBottom:20, display:"flex", alignItems:"center", gap:10 }}>
            <span style={{ fontSize:16 }}>🔒</span>
            <span style={{ fontSize:13, color:"#8FA3BB" }}>
              <strong style={{ color:"#60A5FA" }}>Données protégées</strong> — noms masqués, contacts chiffrés.
              {!mairieStatut && <span style={{ color:"#F59E0B" }}> Accès réservé aux mairies avec compte vérifié et abonnement actif. → <span style={{ cursor:"pointer", textDecoration:"underline" }} onClick={()=>setModal({type:"connexion"})}>Se connecter</span> ou <span style={{ cursor:"pointer", textDecoration:"underline" }} onClick={()=>{setRole("mairie");setView("inscription")}}>Créer un compte</span></span>}

              const cat = GRADES_CAT[o.grade] || "C";

                        {/* Priorités légales : badge GÉNÉRIQUE avant déverrouillage — détail uniquement après consentement */}
                        {(o.prioriteLegale||[]).length > 0 && (() => {

                      </div>
                      <div style={{ fontSize:12, color:"#4A6080", marginTop:2 }}>📍 {o.commune}</div>
                    </div>
                    <div style={{ ...S.chip(db.bg, db.color, db.dot), height:"fit-content", flexShrink:0 }}>
                      <span style={{ width:5, height:5, borderRadius:"50%", background:db.dot, display:"inline-block" }} />
                      {o.dispo}
                    </div>
                  </div>

                  {/* Badges statutaires */}
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:10 }}>

                    {!isLaureat && <span style={S.chip("#0A1628","#8FA3BB","#1E3A5F")}>📋 Mutation {o.typeMobilite}</span>}
                    <span style={S.chip("#0A1628","#8FA3BB","#1E3A5F")}>🏢 {o.typeEmployeur}</span>
                    {isPN && <span style={{ ...S.chip("#450a0a","#fca5a5","#7f1d1d"), fontSize:10 }}>⚠️ Nouvelle assermentation requise</span>}
                  </div>

                  {/* Alertes légales */}
                  {engagement && (
                    <div style={{ background:"#1c1006", border:"1px solid #78350f", borderRadius:6, padding:"7px 10px", marginBottom:10, fontSize:11 }}>
                      <span style={{ color:"#fbbf24", fontWeight:600 }}>⏳ Engagement de servir</span>
                      <span style={{ color:"#92400e", marginLeft:4 }}>jusqu'au {engagement.fin.toLocaleDateString("fr-FR")} ({engagement.moisRestants} mois) — remboursement estimé : {engagement.remb.toLocaleString("fr-FR")} €</span>
                    </div>
                  )}
                  {isPN && (
                    <div style={{ background:"#1e1b4b", border:"1px solid #3730a3", borderRadius:6, padding:"7px 10px", marginBottom:10, fontSize:11, color:"#a5b4fc" }}>
                      ⚠️ Détachement PN/Gendarmerie — nouvelle assermentation obligatoire (3-6 mois, coût à prévoir pour la commune d'accueil)
                    </div>
                  )}

                  {/* Ancienneté & régions */}
                  <div style={{ marginBottom:8 }}>
                    <div style={{ fontSize:10, color:"#4A6080", fontWeight:600, marginBottom:4, letterSpacing:"0.8px" }}>ANCIENNETÉ · RÉGIONS</div>
                    <div style={{ fontSize:12, color:"#8FA3BB", marginBottom:6 }}>🏅 {o.annees} an{o.annees>1?"s":""}</div>
                    <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
                      {(o.regions||[]).map(r=><span key={r} style={S.chip("#0A1628","#8FA3BB","#1E3A5F")}>{r}</span>)}

                  {(() => {
                    const isUnlocked = unlocked.has(o.id);
                    const demandeActive = demandesConsentement.find(d => d.officerId === o.id && d.statut === "en_attente");
                    const demandeAcceptee = demandesConsentement.find(d => d.officerId === o.id && d.statut === "accepte");

                      </div>

                    return (

                        <div style={{ fontSize:12, color:"#4A6080", marginBottom:7, filter:"blur(4px)", userSelect:"none" }}>x.xxxxx@xxxx.fr | 06 XX XX XX XX</div>
                        <button style={{ ...S.btnP, width:"100%", fontSize:12 }} onClick={()=>deverrouiller(o.id)}>

                      </div>
                    );
                  })()}
                </div>

            })}
          </div>

        {/* ══ ANNONCES ════════════════════════════════════════════ */}

          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:22, flexWrap:"wrap", gap:12 }}>
            <div>

              <p style={{ color:"#4A6080", fontSize:13, marginTop:4 }}>Communes, EPCI, Syndicats, CDG — vérifiés uniquement</p>

            <button style={S.btnP} onClick={()=>{

          <div style={{ display:"grid", gap:14 }}>
            {annonces.map(a => (
              <div key={a.id} style={{ ...S.card, padding:"20px 22px", display:"grid", gridTemplateColumns:"1fr auto", gap:16, alignItems:"start" }}

                    <strong style={{ color:"#60A5FA" }}>{a.besoin} poste(s)</strong> · {a.grade} · <strong style={{ color:"#E2E8F0" }}>{a.urgence}</strong>

                  <div style={{ fontSize:11, color:"#4A6080" }}>⏱️ Préavis légal de 3 mois applicable · Vérifier l'engagement de servir de l'agent</div>
                </div>
                <div style={{ textAlign:"right", flexShrink:0 }}>
                  <div style={{ fontSize:11, color:"#2D4A6A", marginBottom:10 }}>{a.date}</div>
                  <button style={{ ...S.btnP, fontSize:12 }} onClick={()=>setView("policiers")}>Voir les profils →</button>
                </div>
              </div>
            ))}
          </div>
        </div>}

        {/* ══ TARIFS ══════════════════════════════════════════════ */}
        {view==="tarifs" && <div style={{ paddingTop:36, maxWidth:900, margin:"0 auto" }}>
          <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:28, fontWeight:800, textAlign:"center", marginBottom:8 }}>Abonnements mensuels</div>

          <div style={{ display:"flex", justifyContent:"center", gap:0, marginBottom:32 }}>
            {["mensuel","annuel"].map(f => (
              <button key={f} onClick={()=>setFacturation(f)} style={{ padding:"9px 24px", background:facturation===f?"#1D4ED8":"#0A1628", color:facturation===f?"white":"#94A3B8", border:"1px solid #1E3A5F", cursor:"pointer", fontFamily:"Barlow,sans-serif", fontWeight:600, fontSize:13, borderRadius:f==="mensuel"?"8px 0 0 8px":"0 8px 8px 0" }}>

              </button>
            ))}
          </div>

          {!mairieStatut && <div style={{ background:"#1c1006", border:"1px solid #78350f", borderRadius:10, padding:"13px 20px", marginBottom:32, textAlign:"center", fontSize:14 }}>
            <span style={{ color:"#fbbf24" }}>⚠️ Vous devez avoir un compte pour souscrire — </span>
            <span style={{ color:"#F59E0B", cursor:"pointer", textDecoration:"underline" }} onClick={()=>setModal({type:"connexion"})}>Se connecter</span>
            <span style={{ color:"#fbbf24" }}> ou </span>
            <span style={{ color:"#F59E0B", cursor:"pointer", textDecoration:"underline" }} onClick={()=>{setRole("mairie");setView("inscription")}}>Créer un compte gratuit →</span>

          </div>}

          {/* ── Grille 3 colonnes · 2 rangées ────────────────────────
               Col 1 : Découverte  (ligne 1) → CDG Département (ligne 2)

               Col 3 : Premium     (ligne 1) → CDG Région      (ligne 2)

          {/* Labels de section */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,minmax(0,1fr))", gap:14, marginBottom:6 }}>

            <div style={{ fontSize:10, color:"#4A6080", fontWeight:700, letterSpacing:"1px", textAlign:"center" }}>COMMUNES · EPCI · SYNDICATS</div>

          {(() => {

                    {ab.id==="commune_affiliee" && <><div style={{ fontSize:11, color:ab.color, marginBottom:4, fontWeight:600 }}>✓ Interface autonome (sans passer par CDG)</div><div style={{ fontSize:11, color:"#64748B", marginBottom:4 }}>✓ Déverrouillages mutualisés quota CDG</div></>}
                    {isCdg && <><div style={{ fontSize:11, color:"#64748B", marginBottom:4 }}>✓ Vue consolidée département</div><div style={{ fontSize:11, color:"#64748B", marginBottom:4 }}>✓ Matching priorités légales</div></>}
                    {ab.id==="cdg_dept"         && <div style={{ fontSize:11, color:"#4ade80", marginBottom:4, fontWeight:600 }}>✓ {ab.desc}</div>}
                    {ab.id==="cdg_region"       && <><div style={{ fontSize:11, color:"#64748B", marginBottom:4 }}>✓ Multi-départements · TB régional</div><div style={{ fontSize:11, color:"#64748B", marginBottom:4 }}>✓ Accès API / intégration SIRH</div></>}
                  </div>
                  {ab.id==="essentiel" && (
                    <div style={{ textAlign:"center", marginTop:14, marginBottom:6 }}>
                      <span style={{ background:`${ab.color}22`, color:ab.color, fontSize:11, fontWeight:700, padding:"4px 12px", borderRadius:20, display:"inline-block" }}>⭐ Le plus choisi</span>
                    </div>
                  )}
                  <button style={{ ...S.btnP, width:"100%", marginTop: ab.id==="essentiel" ? 0 : 14, background:`linear-gradient(135deg,${ab.color},${ab.color}cc)`, fontSize:12, opacity:mairieStatut?1:0.4 }}
                    onClick={()=>souscribreAbonnement(ab)} disabled={!mairieStatut}>
                    {mairieStatut ? `Souscrire — ${prixAff} €${facturation==="annuel"?" / an":" / mois"}` : "🔒 Compte requis"}
                  </button>
                </div>
              );
            };

            return (
              <div>
                {/* Ligne 1 — 3 plans communes standard */}
                <div style={{ display:"grid", gridTemplateColumns:"repeat(3,minmax(0,1fr))", gap:14, marginBottom:14 }}>
                  {communes.map(ab => renderCard(ab))}
                </div>

                {/* Ligne 1bis — Commune affiliée CDG (encadrée en cyan) */}
                <div style={{ border:"1px dashed #06B6D4", borderRadius:12, padding:"12px 16px", marginBottom:14 }}>
                  <div style={{ fontSize:10, color:"#06B6D4", fontWeight:700, letterSpacing:"1px", marginBottom:10, textAlign:"center" }}>
                    COMMUNE AFFILIÉE À UN CDG ABONNÉ — TARIF RÉDUIT −40 %
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"minmax(0,1fr) 2fr", gap:14, alignItems:"start" }}>
                    {renderCard(affiliee)}
                    <div style={{ background:"#0A1220", borderRadius:10, padding:"14px 16px", fontSize:13, color:"#8FA3BB", lineHeight:1.7 }}>
                      <div style={{ fontWeight:700, color:"#E2E8F0", marginBottom:8 }}>Pourquoi ce plan existe-t-il ?</div>
                      <p style={{ marginBottom:10 }}>Si votre CDG est déjà abonné, vous pouvez accéder à PM•EMPLOI <em>via</em> lui gratuitement. Mais ce plan vous donne une <strong style={{ color:"#06B6D4" }}>interface 100 % autonome</strong> — sans dépendre du CDG comme intermédiaire — à tarif préférentiel.</p>
                      <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                        {["Interface propre","Annonces en votre nom","Déverrouillages mutualisés CDG","Tableau de bord dédié"].map(f=>(
                          <span key={f} style={{ background:"#06B6D422", color:"#06B6D4", fontSize:11, padding:"3px 8px", borderRadius:6, fontWeight:600 }}>✓ {f}</span>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>

                {/* Ligne 2 — CDG sous colonnes 1 et 3 */}
                <div style={{ display:"grid", gridTemplateColumns:"repeat(3,minmax(0,1fr))", gap:14, marginBottom:36 }}>
                  <div style={{ gridColumn:"1/-1", display:"grid", gridTemplateColumns:"repeat(3,minmax(0,1fr))", gap:14, marginBottom:6 }}>

                    <div style={{ fontSize:10, color:"#4A6080", fontWeight:700, letterSpacing:"1px", textAlign:"center" }}>CENTRES DE GESTION (CDG)</div>
                  </div>
                  {renderCard(cdgs[0])}

                  { icon:"🔓", val:demandesConsentement.filter(d=>d.statut==="accepte").length, label:"Contacts déverrouillés", color:"#10B981", sub:"ce mois" },
                  { icon:"⚡", val:`${tauxConversion}%`, label:"Taux conversion", color:"#fbbf24", sub:"gratuit → payant" },
                  { icon:"📋", val:annonces.length, label:"Annonces actives", color:"#64748B", sub:"toutes régions" },
                ].map(({icon,val,label,color,sub})=>(
                  <div key={label} style={{ background:"linear-gradient(135deg,#0D1A2E,#0A1628)", border:"1px solid #1A2E4A", borderRadius:12, padding:"14px 16px" }}>
                    <div style={{ fontSize:18, marginBottom:4 }}>{icon}</div>
                    <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:26, fontWeight:800, color, lineHeight:1 }}>{val}</div>
                    <div style={{ fontSize:11, color:"#E2E8F0", fontWeight:600, marginTop:4 }}>{label}</div>
                    <div style={{ fontSize:10, color:"#4A6080", marginTop:2 }}>{sub}</div>
                  </div>
                ))}
              </div>

              {/* ── Onglets ───────────────────────────────────────────── */}
              <div style={{ display:"flex", gap:2, marginBottom:20, borderBottom:"1px solid #1A2E4A", paddingBottom:0 }}>
                {[
                  ["mairies",  "🏛️ Vérification mairies", mairiesAttente],
                  ["agents",   "👮 Agents inscrits",       0],
                  ["annonces", "📋 Modération annonces",   0],
                  ["abonnements","💳 Abonnements",         0],
                ].map(([id,label,badge])=>(
                  <div key={id} onClick={()=>setAdminOnglet(id)}
                    style={{ padding:"10px 16px", cursor:"pointer", fontSize:13, fontWeight:600, position:"relative",
                      color:ongletAdmin===id?"#60A5FA":"#8FA3BB",
                      borderBottom:ongletAdmin===id?"2px solid #3B82F6":"2px solid transparent",
                      marginBottom:-1 }}>
                    {label}
                    {badge>0 && <span style={{ position:"absolute", top:4, right:4, width:16, height:16, background:"#EF4444", borderRadius:"50%", fontSize:9, color:"white", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700 }}>{badge}</span>}
                  </div>
                ))}
              </div>

              {/* ── ONGLET 1 : Vérification mairies ───────────────────── */}
              {ongletAdmin==="mairies" && <div>
                <div style={{ display:"flex", gap:10, marginBottom:16, flexWrap:"wrap" }}>
                  {[["Toutes",demandes.length],["En attente",mairiesAttente],["Validées",mairiesValidees],["Rejetées",demandes.filter(d=>d.statut==="rejetee").length]].map(([l,n])=>(
                    <div key={l} style={{ background:"#0D1A2E", border:"1px solid #1A2E4A", borderRadius:8, padding:"5px 14px", fontSize:12, color:"#8FA3BB" }}>{l} <strong style={{ color:"#E2E8F0" }}>{n}</strong></div>
                  ))}
                </div>
                <div style={{ display:"grid", gap:12 }}>
                  {demandes.map(d => {
                    const bs = statutBadge(d.statut);
                    const alertes = [];
                    if (isBadEmail(d.email)) alertes.push("Email non institutionnel");
                    if (!d.justificatif) alertes.push("Justificatif manquant");
                    if ((d.siret||"").length !== 14) alertes.push("SIRET invalide");
                    if (!d.fonction) alertes.push("Fonction non renseignée");
                    return (
                      <div key={d.id} style={{ ...S.card, padding:"16px 20px", borderLeft:`3px solid ${d.statut==="validee"?"#22c55e":d.statut==="rejetee"?"#EF4444":"#F59E0B"}` }}>
                        <div style={{ display:"grid", gridTemplateColumns:"1fr auto", gap:16, alignItems:"start" }}>
                          <div>
                            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8, flexWrap:"wrap" }}>
                              <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:18, fontWeight:700, color:"#E2E8F0" }}>🏛️ {d.commune}</span>
                              <span style={S.chip("#0A1628","#8FA3BB","#1E3A5F")}>{d.dept}</span>
                              <span style={S.chip("#0A1628","#60A5FA","#1E3A5F")}>{d.typeEmployeur}</span>
                              <span style={S.chip(bs.bg,bs.color,bs.border)}>{bs.label}</span>
                              <span style={{ fontSize:11, color:"#4A6080" }}>{d.date}</span>
                            </div>
                            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))", gap:8, marginBottom:8 }}>
                              {[["👤",`${d.nomContact}${d.fonction?" — "+d.fonction:""}`],["📧",d.email],["🔢",d.siret],["📎",d.justificatif||"Non fourni"]].map(([icon,val])=>(
                                <div key={icon}>
                                  <div style={{ fontSize:10, color:"#4A6080", fontWeight:700 }}>{icon}</div>
                                  <div style={{ fontSize:12, color:val==="Non fourni"?"#EF4444":"#8FA3BB" }}>{val}</div>
                                </div>
                              ))}
                            </div>
                            {alertes.length > 0 && <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                              {alertes.map(a=><span key={a} style={S.chip("#450a0a","#fca5a5","#7f1d1d")}>⚠️ {a}</span>)}
                            </div>}
                            {alertes.length===0 && d.statut==="en_attente" && <span style={S.chip("#052e16","#4ade80","#14532d")}>✅ Dossier complet</span>}
                            {d.motifRejet && <div style={{ background:"#450a0a", border:"1px solid #7f1d1d", borderRadius:6, padding:"6px 10px", marginTop:6, fontSize:12, color:"#fca5a5" }}>Motif : {d.motifRejet}</div>}
                          </div>
                          {d.statut==="en_attente" && (
                            <div style={{ display:"flex", flexDirection:"column", gap:8, flexShrink:0 }}>
                              <button style={S.btnOk} onClick={()=>validerMairie(d.id)}>✅ Valider</button>
                              <button style={S.btnErr} onClick={()=>setModal({type:"rejeter",id:d.id})}>❌ Rejeter</button>
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>}

              {/* ── ONGLET 2 : Agents inscrits ───────────────────────── */}
              {ongletAdmin==="agents" && <div>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, flexWrap:"wrap", gap:10 }}>
                  <div style={{ fontSize:13, color:"#8FA3BB" }}>{officers.length} agents inscrits · <span style={{ color:"#4ade80" }}>{officers.filter(o=>o.statut==="titulaire").length} titulaires</span> · <span style={{ color:"#fbbf24" }}>{officers.filter(o=>o.statut==="laureat").length} lauréats</span></div>
                  <button style={{ ...S.btnG, fontSize:11 }} onClick={()=>notify("Export CSV disponible en production.")}>📊 Exporter CSV</button>
                </div>
                {/* En-tête colonnes */}
                <div style={{ display:"grid", gridTemplateColumns:"2fr 1.5fr 1fr 1fr 90px 80px", gap:8, padding:"6px 12px", fontSize:10, color:"#4A6080", fontWeight:700, letterSpacing:"0.8px", borderBottom:"1px solid #1A2E4A", marginBottom:4 }}>
                  <span>AGENT (ANONYMISÉ)</span><span>COMMUNE · GRADE</span><span>DISPO</span><span>STATUT</span><span>MODE</span><span>ACTION</span>
                </div>
                {officers.map(o => {
                  const {display} = anonymize(o.prenom, o.nom);
                  const db = dispoBadge(o.dispo);
                  const eng = engagementRestant(o.dateTitularisation, o.engagementSigne);
                  const demandeEnCours = demandesConsentement.some(d=>d.officerId===o.id && d.statut==="en_attente");
                  return (
                    <div key={o.id} style={{ display:"grid", gridTemplateColumns:"2fr 1.5fr 1fr 1fr 90px 80px", gap:8, padding:"10px 12px", borderBottom:"1px solid #1A2E4A", alignItems:"center", fontSize:12 }}
                      onMouseEnter={e=>e.currentTarget.style.background="#0A1220"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <div>
                        <span style={{ color:"#E2E8F0", fontWeight:600 }}>{display}</span>
                        {(o.prioriteLegale||[]).length>0 && <span style={{ fontSize:10, color:"#93C5FD", marginLeft:6 }}>⭐</span>}
                        {eng && <span style={{ fontSize:10, color:"#fbbf24", marginLeft:6 }}>⚠️ Eng.</span>}
                        {demandeEnCours && <span style={{ fontSize:10, color:"#c084fc", marginLeft:6 }}>⏳ Consentement</span>}
                      </div>
                      <div style={{ color:"#8FA3BB" }}>{(o.commune||"").replace(/\s*\(\d+\)/,"")} · <span style={{ color:catColor(GRADES_CAT[o.grade]||"C") }}>{o.grade}</span></div>
                      <span style={S.chip(db.bg,db.color,db.dot)}>{o.dispo}</span>
                      <span style={S.chip(o.statut==="titulaire"?"#052e16":"#1e3a5f", o.statut==="titulaire"?"#4ade80":"#60A5FA", o.statut==="titulaire"?"#14532d":"#2D5A8E")}>
                        {o.statut==="titulaire"?"Titulaire":"Lauréat"}
                      </span>
                      <span style={{ fontSize:11, color: autorisationEmployeur?"#4ade80":"#F59E0B" }}>
                        {/* Note: en prod chaque agent a son propre modeRecherche */}
                        🟢 Actif
                      </span>
                      <button style={{ fontSize:10, padding:"3px 8px", borderRadius:5, border:"1px solid #7f1d1d", background:"#450a0a", color:"#fca5a5", cursor:"pointer", fontFamily:"Barlow,sans-serif" }}
                        onClick={()=>notify(`Profil de ${display} suspendu (démo).`,"error")}>
                        Suspendre
                      </button>
                    </div>
                  );
                })}
              </div>}

              {/* ── ONGLET 3 : Modération annonces ──────────────────── */}
              {ongletAdmin==="annonces" && <div>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, flexWrap:"wrap", gap:10 }}>
                  <div style={{ fontSize:13, color:"#8FA3BB" }}>{annonces.length} annonces actives · toutes mairies vérifiées</div>
                  <button style={{ ...S.btnG, fontSize:11 }} onClick={()=>notify("Export CSV disponible en production.")}>📊 Exporter CSV</button>
                </div>
                <div style={{ display:"grid", gap:10 }}>
                  {annonces.map(a=>(
                    <div key={a.id} style={{ ...S.card, padding:"14px 18px", display:"grid", gridTemplateColumns:"1fr auto", gap:12, alignItems:"center" }}>
                      <div>
                        <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:6, flexWrap:"wrap" }}>
                          <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:16, fontWeight:700, color:"#E2E8F0" }}>🏛️ {a.commune}</span>
                          <span style={S.chip("#0A1628","#8FA3BB","#1E3A5F")}>{a.dept}</span>
                          <span style={S.chip("#0A1628","#60A5FA","#1E3A5F")}>{a.region}</span>
                          <span style={S.chip( a.urgence==="Urgent"?"#450a0a":"#052e16", a.urgence==="Urgent"?"#fca5a5":"#4ade80", a.urgence==="Urgent"?"#7f1d1d":"#14532d")}>
                            {a.urgence==="Urgent"?"🔴":"🟢"} {a.urgence}
                          </span>
                        </div>
                        <div style={{ fontSize:12, color:"#8FA3BB" }}>{a.grade} · {a.besoin} poste(s) · {a.typeEmployeur}</div>
                        {a.description && <div style={{ fontSize:11, color:"#4A6080", marginTop:4, fontStyle:"italic" }}>"{a.description.slice(0,80)}…"</div>}
                        <div style={{ fontSize:10, color:"#2D4A6A", marginTop:4 }}>Publiée le {a.date}</div>
                      </div>
                      <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                        <button style={{ ...S.btnOk, fontSize:11, padding:"5px 12px" }} onClick={()=>notify(`Annonce ${a.commune} épinglée en priorité.`)}>📌 Épingler</button>
                        <button style={{ ...S.btnErr, fontSize:11, padding:"5px 12px" }}
                          onClick={()=>{ setAnnonces(p=>p.filter(x=>x.id!==a.id)); notify(`Annonce ${a.commune} supprimée.`,"error"); }}>
                          🗑️ Supprimer
                        </button>
                      </div>
                    </div>
                  ))}
                  {annonces.length===0 && <div style={{ textAlign:"center", color:"#4A6080", padding:"40px 0", fontSize:14 }}>Aucune annonce active.</div>}
                </div>
              </div>}

              {/* ── ONGLET 4 : Abonnements actifs ───────────────────── */}
              {ongletAdmin==="abonnements" && <div>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, flexWrap:"wrap", gap:10 }}>
                  <div>
                    <span style={{ fontSize:13, color:"#8FA3BB" }}>MRR total : </span>
                    <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:24, fontWeight:800, color:"#4ade80" }}>{mrr} €/mois</span>
                    <span style={{ fontSize:12, color:"#4A6080", marginLeft:10 }}>ARR estimé : {(mrr*10).toLocaleString("fr-FR")} €</span>
                  </div>
                  <button style={{ ...S.btnG, fontSize:11 }} onClick={()=>notify("Export comptable disponible en production (format FACTUR-X).")}>📄 Export comptable</button>
                </div>
                {/* En-tête */}
                <div style={{ display:"grid", gridTemplateColumns:"2fr 1.5fr 1fr 1fr 80px", gap:8, padding:"6px 12px", fontSize:10, color:"#4A6080", fontWeight:700, letterSpacing:"0.8px", borderBottom:"1px solid #1A2E4A", marginBottom:4 }}>
                  <span>ABONNÉ</span><span>PLAN</span><span>PRIX/MOIS</span><span>DEPUIS</span><span>ACTION</span>
                </div>
                {[
                  { nom:"Mairie de Sète",  type:"mairie", plan:"Essentiel",      prix:49,  depuis:"01/03/2026", statut:"actif" },
                  { nom:"CDG Hérault 34",  type:"cdg",    plan:"CDG Département",prix:399, depuis:"15/01/2026", statut:"actif" },
                ].map((ab,i)=>(
                  <div key={i} style={{ display:"grid", gridTemplateColumns:"2fr 1.5fr 1fr 1fr 80px", gap:8, padding:"11px 12px", borderBottom:"1px solid #1A2E4A", alignItems:"center", fontSize:13 }}
                    onMouseEnter={e=>e.currentTarget.style.background="#0A1220"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <div>
                      <span style={{ color:"#E2E8F0", fontWeight:600 }}>{({mairie:"🏛️",cdg:"🗺️"})[ab.type]} {ab.nom}</span>
                    </div>
                    <div>
                      <span style={{ background: ab.type==="cdg"?"#2e1065":"#1c1917", color: ab.type==="cdg"?"#c084fc":"#fbbf24", fontSize:11, fontWeight:600, padding:"2px 8px", borderRadius:6 }}>{ab.plan}</span>
                    </div>
                    <span style={{ color:"#4ade80", fontFamily:"'Barlow Condensed',sans-serif", fontSize:18, fontWeight:800 }}>{ab.prix} €</span>
                    <span style={{ color:"#4A6080", fontSize:11 }}>{ab.depuis}</span>
                    <div style={{ display:"flex", gap:4 }}>
                      <button style={{ fontSize:10, padding:"3px 7px", borderRadius:5, border:"1px solid #1E3A5F", background:"#0A1628", color:"#60A5FA", cursor:"pointer", fontFamily:"Barlow,sans-serif" }}
                        onClick={()=>notify(`Geste commercial appliqué à ${ab.nom}.`)}>Geste</button>
                    </div>
                  </div>
                ))}
                {/* Projection MRR */}
                <div style={{ marginTop:20, ...S.card, padding:"16px 20px", borderLeft:"3px solid #4ade80" }}>
                  <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:15, fontWeight:700, color:"#E2E8F0", marginBottom:12 }}>📈 Projection de croissance — Scénario central</div>
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10 }}>
                    {[["M+1","~600 €"],["M+3","~1 200 €"],["M+6","~2 000 €"],["M+12","~5 400 €"]].map(([m,v])=>(
                      <div key={m} style={{ textAlign:"center", background:"#0A1220", borderRadius:8, padding:"10px 8px" }}>
                        <div style={{ fontSize:11, color:"#4A6080" }}>{m}</div>
                        <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:20, fontWeight:800, color:"#4ade80" }}>{v}</div>
                        <div style={{ fontSize:10, color:"#2D4A6A" }}>MRR</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>}
            </div>
            );
          })()}
        </div>}

        {/* ══ INSCRIPTION POLICIER ════════════════════════════════ */}
        {view==="inscription" && role==="policier" && <div style={{ paddingTop:36, maxWidth:700, margin:"0 auto" }}>
          <button style={{ ...S.btnG, marginBottom:22, fontSize:12 }}
            onClick={()=>setView(userConnecte && userType==="pm" ? "dashboard_pm" : "accueil")}>← Retour</button>
          <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:26, fontWeight:800, marginBottom:6 }}>
            {userConnecte && userType==="pm" ? "✏️ Modifier mon profil" : "👮 Inscription Policier Municipal"}
          </div>
          <div style={{ background:"#052e16", border:"1px solid #14532d", borderRadius:8, padding:"10px 14px", marginBottom:20, fontSize:13, color:"#86efac" }}>
            🔒 <strong>Protection garantie</strong> — nom anonymisé, coordonnées chiffrées. Déverrouillage uniquement par mairies officiellement vérifiées avec abonnement actif.
          </div>
          {(newOfficer.prenom||newOfficer.nom) && <div style={{ background:"#0A1220", border:"1px solid #1E3A5F", borderRadius:8, padding:"9px 14px", marginBottom:16, fontSize:13 }}>
            👁️ Aperçu public : <strong style={{ color:"#60A5FA" }}>
              {newOfficer.prenom?newOfficer.prenom[0]+".":"J."} {newOfficer.nom?(newOfficer.nom[0]+(newOfficer.nom.length>2?"*".repeat(newOfficer.nom.length-2)+newOfficer.nom[newOfficer.nom.length-1]:"*")):"D***t"}
            </strong>
          </div>}
          <div style={{ ...S.card, padding:26 }}>

            {/* Identité */}
            <div style={{ fontSize:11, color:"#4A6080", fontWeight:700, letterSpacing:"1px", marginBottom:12 }}>IDENTITÉ (ANONYMISÉE SUR LA PLATEFORME)</div>
            <div style={FR} className="fr2">
              <div><label>Prénom *</label><input placeholder="Jean" value={newOfficer.prenom} onChange={e=>setNewOfficer(p=>({...p,prenom:e.target.value}))} /></div>
              <div><label>Nom *</label><input placeholder="Dupont" value={newOfficer.nom} onChange={e=>setNewOfficer(p=>({...p,nom:e.target.value}))} /></div>
            </div>
            <div style={FR} className="fr2">
              <div><label>Grade</label>
                <select value={newOfficer.grade} onChange={e=>setNewOfficer(p=>({...p,grade:e.target.value}))}>
                  {GRADES.map(g=><option key={g}>{g} (Cat. {GRADES_CAT[g]})</option>)}
                </select>
              </div>
              <div><label>Ancienneté (années)</label><input type="number" placeholder="5" min="0" max="40" value={newOfficer.annees} onChange={e=>setNewOfficer(p=>({...p,annees:e.target.value}))} /></div>
            </div>
            <div style={FR} className="fr2">
              <div><label>Commune actuelle</label><input placeholder="Ex : Bordeaux (33)" value={newOfficer.commune} onChange={e=>setNewOfficer(p=>({...p,commune:e.target.value}))} /></div>
              <div><label>Type d'employeur actuel</label>
                <select value={newOfficer.typeEmployeur} onChange={e=>setNewOfficer(p=>({...p,typeEmployeur:e.target.value}))}>
                  {TYPE_EMPLOYEUR.map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
            </div>

            {/* Statut et origine */}
            <div style={{ fontSize:11, color:"#4A6080", fontWeight:700, letterSpacing:"1px", marginTop:16, marginBottom:12 }}>STATUT ET ORIGINE</div>
            <div style={FR} className="fr2">
              <div><label>Situation actuelle *</label>
                <select value={newOfficer.origine} onChange={e=>{
                  const isLaureat = e.target.value === "Lauréat de concours (1er poste)";
                  setNewOfficer(p=>({...p, origine:e.target.value, statut:isLaureat?"laureat":"titulaire"}));
                }}>
                  {ORIGINES.map(o=><option key={o}>{o}</option>)}
                </select>
              </div>
              <div><label>Disponibilité</label>
                <select value={newOfficer.dispo} onChange={e=>setNewOfficer(p=>({...p,dispo:e.target.value}))}>
                  {["Immédiate","1 mois","3 mois","6 mois"].map(d=><option key={d}>{d}</option>)}
                </select>
              </div>
            </div>

            {/* Engagement de servir */}
            {newOfficer.statut === "titulaire" && <>
              <div style={FR} className="fr2">
                <div>
                  <label>Date de titularisation</label>
                  <input type="date" value={newOfficer.dateTitularisation} onChange={e=>setNewOfficer(p=>({...p,dateTitularisation:e.target.value}))} />
                </div>
                <div>
                  <label>Engagement de servir signé ?</label>
                  <select value={newOfficer.engagementSigne} onChange={e=>setNewOfficer(p=>({...p,engagementSigne:e.target.value}))}>
                    <option>Non</option><option>Oui</option><option>Je ne sais pas</option>
                  </select>
                </div>
              </div>
              {(() => {
                const eng = engagementRestant(newOfficer.dateTitularisation, newOfficer.engagementSigne);
                if (!eng) return null;
                return <div style={{ background:"#1c1006", border:"1px solid #78350f", borderRadius:6, padding:"8px 12px", marginBottom:12, fontSize:12, color:"#fbbf24" }}>
                  ⏳ Engagement de servir actif jusqu'au {eng.fin.toLocaleDateString("fr-FR")} — en cas de mutation, remboursement de formation estimé : <strong>{eng.remb.toLocaleString("fr-FR")} €</strong> (à la charge de la commune d'accueil)
                </div>;
              })()}
            </>}

            {/* Priorités légales */}
            <div style={{ fontSize:11, color:"#4A6080", fontWeight:700, letterSpacing:"1px", marginTop:16, marginBottom:8 }}>PRIORITÉS LÉGALES DE MUTATION (art. L.512-26 CGFP)</div>
            <div style={{ fontSize:12, color:"#64748B", marginBottom:10 }}>Ces critères donnent droit à un examen prioritaire de votre demande. Cochez si applicable.</div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:14 }}>
              {[["conjoint","👨‍👩‍👧 Séparé(e) du conjoint/PACS pour raisons pro"],["rqth","♿ Travailleur handicapé (RQTH)"],["aidant","🤝 Proche aidant"]].map(([val,label])=>(
                <span key={val} style={S.tag(newOfficer.prioriteLegale.includes(val))} onClick={()=>setNewOfficer(p=>({...p,prioriteLegale:toggleArr(p.prioriteLegale,val)}))}>
                  {label}
                </span>
              ))}
            </div>

            {/* Mobilité souhaitée */}
            <div style={{ fontSize:11, color:"#4A6080", fontWeight:700, letterSpacing:"1px", marginTop:6, marginBottom:12 }}>MOBILITÉ ET SOUHAITS</div>
            <div style={FR} className="fr2">
              <div><label>Type de mobilité souhaité</label>
                <select value={newOfficer.typeMobilite} onChange={e=>setNewOfficer(p=>({...p,typeMobilite:e.target.value}))}>
                  {TYPE_MOBILITE.map(t=><option key={t}>{t}</option>)}
                </select>
              </div>

            <div style={{ marginBottom:14 }}>

            </div>
            <div style={{ marginBottom:14 }}>
              <label>Spécialités</label>
              <div style={{ display:"flex", flexWrap:"wrap", gap:5, marginTop:7 }}>

            <div style={{ fontSize:11, color:"#4A6080", fontWeight:700, letterSpacing:"1px", marginTop:6, marginBottom:12 }}>COORDONNÉES (CONFIDENTIELLES)</div>

              <div><label>Email professionnel *</label><input type="email" placeholder="jean.dupont@mairie.fr" value={newOfficer.email} onChange={e=>setNewOfficer(p=>({...p,email:e.target.value}))} /></div>
              <div><label>Téléphone</label><input placeholder="06 00 00 00 00" value={newOfficer.tel} onChange={e=>setNewOfficer(p=>({...p,tel:e.target.value}))} /></div>

            <div style={{ display:"flex", gap:10, marginTop:20 }}>
              <button style={{ ...S.btnP, flex:1, padding:"12px" }} onClick={sauvegarderPolicier}>
