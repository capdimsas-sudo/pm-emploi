              </button>
              <button style={S.btnG} onClick={()=>setView(userConnecte && userType==="pm" ? "dashboard_pm" : "accueil")}>Annuler</button>
            </div>
          </div>
        </div>}

        {/* ══ INSCRIPTION MAIRIE ══════════════════════════════════ */}
        {view==="inscription" && role==="mairie" && <div style={{ paddingTop:36, maxWidth:700, margin:"0 auto" }}>
          <button style={{ ...S.btnG, marginBottom:22, fontSize:12 }} onClick={()=>setView(userConnecte?"dashboard_mairie":"accueil")}>← Retour</button>

          {/* ── BRANCHE A : mairie déjà vérifiée et connectée → formulaire annonce pré-rempli ── */}
          {mairieStatut === "verifie" && userConnecte && userType === "mairie" ? (<>
            <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:26, fontWeight:800, marginBottom:4 }}>📋 Publier une annonce</div>
            <p style={{ color:"#4A6080", marginBottom:16 }}>
              🏛️ <strong style={{ color:"#E2E8F0" }}>{userProfil?.commune}</strong> · {userProfil?.dept} · {userProfil?.typeEmployeur}
            </p>
            <div style={{ background:"#052e16", border:"1px solid #14532d", borderRadius:8, padding:"9px 14px", marginBottom:20, fontSize:13, color:"#86efac" }}>
              ✅ Mairie vérifiée — vos coordonnées sont pré-remplies. Complétez les détails du poste.
            </div>
            <div style={{ ...S.card, padding:26 }}>
              <div style={{ fontSize:11, color:"#4A6080", fontWeight:700, letterSpacing:"1px", marginBottom:14 }}>DÉTAILS DU POSTE</div>
              <div style={FR} className="fr2">
                <div>
                  <label>Poste recherché</label>
                  <select value={newAnnonce.grade} onChange={e=>setNewAnnonce(p=>({...p,grade:e.target.value}))}>
                    {["Tous grades",...GRADES].map(g=><option key={g}>{g}</option>)}
                  </select>
                </div>
                <div>
                  <label>Nombre de postes</label>
                  <input type="number" min="1" max="20" value={newAnnonce.besoin} onChange={e=>setNewAnnonce(p=>({...p,besoin:e.target.value}))} />
                </div>
              </div>
              <div style={FR} className="fr2">
                <div>
                  <label>Délai souhaité *</label>
                  <select value={newAnnonce.urgence} onChange={e=>setNewAnnonce(p=>({...p,urgence:e.target.value}))}>
                    <option value="">Choisir...</option>
                    {["Urgent","1 mois","2 mois","3 mois","6 mois","Saison estivale"].map(d=><option key={d}>{d}</option>)}
                  </select>
                </div>
                <div>
                  <label>Région</label>
                  <select value={newAnnonce.region} onChange={e=>setNewAnnonce(p=>({...p,region:e.target.value}))}>
                    <option value="">Choisir...</option>
                    {REGIONS.map(r=><option key={r}>{r}</option>)}
                  </select>
                </div>
              </div>
              <div style={{ marginBottom:20 }}>
                <label>Description du poste</label>
                <textarea rows={4} placeholder="Décrivez le poste, les avantages, le contexte (logement possible, prime d'installation, partenariat PN...)..."
                  value={newAnnonce.description} onChange={e=>setNewAnnonce(p=>({...p,description:e.target.value}))} style={{ resize:"vertical" }} />
              </div>
              {/* Récap pré-rempli en lecture seule */}
              <div style={{ background:"#0A1220", border:"1px solid #1E3A5F", borderRadius:8, padding:"10px 14px", marginBottom:20 }}>
                <div style={{ fontSize:10, color:"#4A6080", fontWeight:700, marginBottom:8, letterSpacing:"0.8px" }}>DONNÉES MAIRIE (PRÉ-REMPLIES)</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, fontSize:12 }}>
                  {[["Commune",userProfil?.commune],["Département",userProfil?.dept],["Type",userProfil?.typeEmployeur],["Gestionnaire",userProfil?.nomContact]].map(([k,v])=>(
                    <div key={k}><span style={{ color:"#4A6080" }}>{k} : </span><span style={{ color:"#E2E8F0" }}>{v}</span></div>
                  ))}
                </div>
              </div>
              <div style={{ display:"flex", gap:10 }}>
                <button style={{ ...S.btnP, flex:1, padding:"12px" }} onClick={()=>{
                  if (!newAnnonce.urgence) { notify("Veuillez choisir un délai","error"); return; }
                  setNewAnnonce(p=>({...p,
                    commune: userProfil?.commune || p.commune,
                    dept: userProfil?.dept || p.dept,
                    typeEmployeur: userProfil?.typeEmployeur || p.typeEmployeur
                  }));
                  setTimeout(()=>publierAnnonce(), 50);
                }}>📢 Publier l'annonce</button>
                <button style={S.btnG} onClick={()=>setView("dashboard_mairie")}>Annuler</button>
              </div>
            </div>
          </>) : (

          /* ── BRANCHE B : mairie non connectée / non vérifiée → demande de vérification ── */
          <>
            <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:26, fontWeight:800, marginBottom:6 }}>🏛️ Demande de vérification</div>
            <p style={{ color:"#4A6080", marginBottom:20 }}>Commune, EPCI, Syndicat intercommunal ou CDG — dossier examiné sous 48h ouvrées.</p>

          {/* Critères */}
          <div style={{ ...S.card, padding:"16px 20px", marginBottom:22, borderLeft:"3px solid #F59E0B" }}>
            <div style={{ fontWeight:700, fontSize:13, color:"#F59E0B", marginBottom:10 }}>📋 Conditions obligatoires</div>
            {[["Email institutionnel","@mairie-xxx.fr, @cc-xxx.fr — Gmail/Yahoo automatiquement refusés"],
              ["SIRET 14 chiffres","Vérifié sur base SIRENE — SIRET invalide = rejet immédiat"],
              ["Fonction habilitée","Maire, DGS, DRH, Chef service PM, Secrétaire Général ou délégataire"],
              ["Justificatif officiel","Arrêté municipal, délégation de signature ou extrait de délibération"],
            ].map(([t,d])=>(
              <div key={t} style={{ marginBottom:8 }}>
                <span style={{ fontSize:13, color:"#E2E8F0", fontWeight:600 }}>✅ {t}</span>
                <span style={{ fontSize:12, color:"#64748B", marginLeft:6 }}>— {d}</span>
              </div>
            ))}
          </div>

          <div style={{ ...S.card, padding:26 }}>
            <div style={{ fontSize:11, color:"#4A6080", fontWeight:700, letterSpacing:"1px", marginBottom:12 }}>IDENTIFICATION DE LA COLLECTIVITÉ</div>
            <div style={FR} className="fr2">
              <div><label>Nom *</label><input placeholder="Ex : Sète" value={newMairie.commune} onChange={e=>setNewMairie(p=>({...p,commune:e.target.value}))} /></div>
              <div><label>Département</label><input placeholder="Ex : Hérault (34)" value={newMairie.dept} onChange={e=>setNewMairie(p=>({...p,dept:e.target.value}))} /></div>
            </div>
            <div style={FR} className="fr2">
              <div><label>Type d'employeur *</label>
                <select value={newMairie.typeEmployeur} onChange={e=>setNewMairie(p=>({...p,typeEmployeur:e.target.value}))}>
                  {TYPE_EMPLOYEUR.map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
              <div>
                <label>SIRET (14 chiffres) *</label>
                <input placeholder="21340270600017" maxLength={14} value={newMairie.siret} onChange={e=>setNewMairie(p=>({...p,siret:e.target.value.replace(/\D/g,"")}))}
                  style={{ borderColor:newMairie.siret&&newMairie.siret.length!==14?"#EF4444":"#1E3A5F" }} />
                {newMairie.siret&&newMairie.siret.length!==14&&<div style={{ fontSize:11, color:"#EF4444", marginTop:3 }}>{newMairie.siret.length}/14 chiffres</div>}
              </div>
            </div>

            <div style={{ fontSize:11, color:"#4A6080", fontWeight:700, letterSpacing:"1px", marginTop:16, marginBottom:12 }}>RESPONSABLE DE LA DEMANDE</div>
            <div style={FR} className="fr2">
              <div><label>Nom et Prénom *</label><input placeholder="Marie Dupont" value={newMairie.nomContact} onChange={e=>setNewMairie(p=>({...p,nomContact:e.target.value}))} /></div>
              <div><label>Fonction *</label>
                <select value={newMairie.fonction} onChange={e=>setNewMairie(p=>({...p,fonction:e.target.value}))}>
                  <option value="">Choisir...</option>
                  {FONCTIONS_MAIRIE.map(f=><option key={f}>{f}</option>)}
                </select>
              </div>
            </div>
            <div style={FR} className="fr2">
              <div>
                <label>Email institutionnel * <span style={{ color:"#EF4444", fontSize:11 }}>— pas Gmail/Yahoo</span></label>
                <input type="email" placeholder="drh@mairie-sete.fr" value={newMairie.email} onChange={e=>setNewMairie(p=>({...p,email:e.target.value}))}
                  style={{ borderColor:newMairie.email&&isBadEmail(newMairie.email)?"#EF4444":"#1E3A5F" }} />
                {newMairie.email&&isBadEmail(newMairie.email)&&<div style={{ fontSize:11, color:"#EF4444", marginTop:3 }}>Email refusé automatiquement</div>}
              </div>
              <div><label>Téléphone</label><input placeholder="04 67 74 74 74" value={newMairie.tel} onChange={e=>setNewMairie(p=>({...p,tel:e.target.value}))} /></div>
            </div>
            <div style={{ marginBottom:16 }}>
              <label>Justificatif *</label>
              <input placeholder="Ex : Arrêté_PM_2026.pdf, Délégation_DRH.pdf" value={newMairie.justificatif} onChange={e=>setNewMairie(p=>({...p,justificatif:e.target.value}))} />
            </div>

            {newMairie.typeEmployeur === "Centre de Gestion (CDG)" && (
              <div style={{ background:"#0A1220", border:"1px solid #1E3A5F", borderRadius:8, padding:"10px 14px", marginBottom:14, fontSize:13, color:"#8FA3BB" }}>
                ℹ️ Un abonnement CDG couvre <strong style={{ color:"#E2E8F0" }}>toutes les communes affiliées</strong> de votre département. Dès 399€/mois — soit 1,16€/commune/mois pour un CDG de 344 communes.
              </div>
            )}
            {newMairie.typeEmployeur === "EPCI à fiscalité propre" && (
              <div style={{ background:"#0A1220", border:"1px solid #1E3A5F", borderRadius:8, padding:"10px 14px", marginBottom:14, fontSize:13, color:"#8FA3BB" }}>
                ℹ️ Pour un EPCI, l'interlocuteur de mutation sortante est le <strong style={{ color:"#E2E8F0" }}>Président de l'EPCI</strong> (et non le Maire de la commune d'affectation). La mobilité interne entre communes membres ne constitue pas une mutation formelle.
              </div>
            )}
            {newMairie.typeEmployeur === "Syndicat intercommunal" && (
              <div style={{ background:"#0A1220", border:"1px solid #1E3A5F", borderRadius:8, padding:"10px 14px", marginBottom:14, fontSize:13, color:"#8FA3BB" }}>
                ℹ️ Pour un syndicat intercommunal, c'est le <strong style={{ color:"#E2E8F0" }}>bureau syndical (organe collégial)</strong> qui statue sur les mutations sortantes. Les délais de mobilité interne suivent les statuts propres du syndicat (variables).
              </div>
            )}

            <div style={{ background:"#0A1220", border:"1px solid #1E3A5F", borderRadius:8, padding:"10px 14px", marginBottom:18, fontSize:12, color:"#8FA3BB" }}>
              ⚖️ En soumettant ce formulaire, vous certifiez agir au nom d'une collectivité territoriale française. Toute usurpation sera signalée aux autorités compétentes.
            </div>

            {/* Publier annonce */}
            <div style={{ fontSize:11, color:"#4A6080", fontWeight:700, letterSpacing:"1px", marginTop:4, marginBottom:12 }}>PUBLIER UNE ANNONCE (OPTIONNEL)</div>
            <div style={FR} className="fr2">
              <div><label>Poste recherché</label>
                <select value={newAnnonce.grade} onChange={e=>setNewAnnonce(p=>({...p,grade:e.target.value}))}>
                  {["Tous grades",...GRADES].map(g=><option key={g}>{g}</option>)}
                </select>
              </div>
              <div><label>Nombre de postes</label><input type="number" min="1" max="20" value={newAnnonce.besoin} onChange={e=>setNewAnnonce(p=>({...p,besoin:e.target.value}))} /></div>
            </div>
            <div style={FR} className="fr2">
              <div><label>Délai souhaité</label>
                <select value={newAnnonce.urgence} onChange={e=>setNewAnnonce(p=>({...p,urgence:e.target.value}))}>
                  <option value="">Choisir...</option>
                  {["Urgent","1 mois","2 mois","3 mois","6 mois","Saison estivale"].map(d=><option key={d}>{d}</option>)}
                </select>
              </div>
              <div><label>Région</label>
                <select value={newAnnonce.region} onChange={e=>setNewAnnonce(p=>({...p,region:e.target.value}))}>
                  <option value="">Choisir...</option>
                  {REGIONS.map(r=><option key={r}>{r}</option>)}
                </select>
              </div>
            </div>
            <div style={{ marginBottom:16 }}>
              <label>Description du poste</label>
              <textarea rows={3} placeholder="Décrivez le poste, les avantages, le contexte..." value={newAnnonce.description} onChange={e=>setNewAnnonce(p=>({...p,description:e.target.value}))} style={{ resize:"vertical" }} />
            </div>

            <div style={{ display:"flex", gap:10 }}>
              <button style={{ ...S.btnP, flex:1, padding:"12px" }} onClick={()=>{
                soumettreMailrie();
                if (newAnnonce.urgence && newAnnonce.commune === "") {
                  setNewAnnonce(p=>({...p, commune:newMairie.commune, dept:newMairie.dept, typeEmployeur:newMairie.typeEmployeur}));
                }
                if (newAnnonce.urgence) setTimeout(()=>publierAnnonce(), 100);
              }}>📤 Soumettre le dossier</button>
              <button style={S.btnG} onClick={()=>setView("accueil")}>Annuler</button>
            </div>
          </div>
          </>)}
        </div>}
      </main>

      {/* ═══════ MODALS ═══════ */}

      {/* Connexion */}
      {modal?.type==="connexion" && <div className="overlay" onClick={()=>{setModal(null);setLoginError("")}}>
        <div className="modal" style={{ maxWidth:420 }} onClick={e=>e.stopPropagation()}>
          <div style={{ textAlign:"center", marginBottom:20 }}>
            <div style={{ fontSize:40, marginBottom:8 }}>🔑</div>
            <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:22, fontWeight:800 }}>Connexion à PM•EMPLOI</div>
            <p style={{ fontSize:12, color:"#4A6080", marginTop:6 }}>Entrez votre email et votre code d'accès</p>
          </div>
          {/* Comptes démo */}
          <div style={{ background:"#0A1220", border:"1px solid #1E3A5F", borderRadius:8, padding:"10px 14px", marginBottom:18 }}>
            <div style={{ fontSize:10, color:"#4A6080", fontWeight:700, letterSpacing:"1px", marginBottom:8 }}>COMPTES DÉMO DISPONIBLES</div>
            {DEMO_ACCOUNTS.map(a=>(
              <div key={a.email} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"5px 0", borderBottom:"1px solid #1A2E4A", cursor:"pointer" }}
                onClick={()=>{setLoginEmail(a.email);setLoginCode(a.code)}}
                onMouseEnter={e=>e.currentTarget.style.background="#0D1A2E"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <span style={{ fontSize:12, color:"#8FA3BB" }}>{({pm:"👮",mairie:"🏛️",cdg:"🗺️",admin:"⚙️"})[a.type]} {a.email}</span>
                <span style={{ fontSize:11, color:"#3B82F6", fontWeight:600 }}>{a.code}</span>
              </div>
            ))}
            <div style={{ fontSize:10, color:"#2D4A6A", marginTop:6 }}>Cliquez sur un compte pour le pré-remplir</div>
          </div>
          {/* Formulaire */}
          <div style={{ marginBottom:12 }}>
            <label style={{ fontSize:12, color:"#8FA3BB", display:"block", marginBottom:5 }}>Email</label>
            <input type="email" placeholder="email@collectivite.fr" value={loginEmail} onChange={e=>setLoginEmail(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&handleConnexion()} />
          </div>
          <div style={{ marginBottom:16, position:"relative" }}>
            <label style={{ fontSize:12, color:"#8FA3BB", display:"block", marginBottom:5 }}>Code d'accès</label>
            <input type={mdpVisible?"text":"password"} placeholder="Code d'accès" value={loginCode} onChange={e=>setLoginCode(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&handleConnexion()} />
            <button onClick={()=>setMdpVisible(v=>!v)} style={{ position:"absolute", right:10, top:28, background:"none", border:"none", color:"#4A6080", cursor:"pointer", fontSize:14 }}>
              {mdpVisible?"🙈":"👁️"}
            </button>
          </div>
          {loginError && <div style={{ background:"#450a0a", border:"1px solid #7f1d1d", borderRadius:6, padding:"8px 12px", marginBottom:12, fontSize:12, color:"#fca5a5" }}>⚠️ {loginError}</div>}
          <button style={{ ...S.btnP, width:"100%", padding:"12px", marginBottom:12 }} onClick={handleConnexion}>Se connecter</button>
          <div style={{ display:"flex", gap:8, justifyContent:"center", flexWrap:"wrap" }}>
            <span style={{ fontSize:12, color:"#4A6080" }}>Pas encore de compte ?</span>
            <span style={{ fontSize:12, color:"#3B82F6", cursor:"pointer", textDecoration:"underline" }} onClick={()=>{setModal(null);setRole("policier");setView("inscription")}}>Créer un profil PM →</span>
            <span style={{ fontSize:12, color:"#4A6080" }}>|</span>
            <span style={{ fontSize:12, color:"#10B981", cursor:"pointer", textDecoration:"underline" }} onClick={()=>{setModal(null);setRole("mairie");setView("inscription")}}>Inscrire ma mairie →</span>
          </div>
        </div>
      </div>}

      {/* Non vérifiée — pas de compte */}
      {modal?.type==="non_verifiee" && <div className="overlay" onClick={()=>setModal(null)}>
        <div className="modal" style={{ textAlign:"center" }} onClick={e=>e.stopPropagation()}>
          <div style={{ fontSize:50, marginBottom:14 }}>🔒</div>
          <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:22, fontWeight:800, marginBottom:10 }}>Compte requis</div>
          <p style={{ color:"#8FA3BB", fontSize:14, lineHeight:1.7, marginBottom:6 }}>Créez un compte gratuitement pour <strong style={{ color:"#4ade80" }}>publier des annonces</strong> et recevoir des candidatures d'agents PM.</p>
          <p style={{ color:"#8FA3BB", fontSize:13, lineHeight:1.7, marginBottom:20 }}>La souscription d'un abonnement vous donnera ensuite accès aux profils PM et au déverrouillage des coordonnées.</p>
          <div style={{ display:"flex", gap:10, justifyContent:"center", flexWrap:"wrap" }}>
            <button style={S.btnP} onClick={()=>{setModal(null);setRole("mairie");setView("inscription")}}>🏛️ Créer un compte gratuit</button>
            <button style={{ ...S.btnG, borderColor:"#2D5A8E" }} onClick={()=>{setModal(null);setModal({type:"connexion"})}}>🔑 Se connecter</button>
          </div>
        </div>
      </div>}

      {/* Non abonné — compte créé mais pas encore abonné */}
      {modal?.type==="non_abonne" && <div className="overlay" onClick={()=>setModal(null)}>
        <div className="modal" style={{ textAlign:"center" }} onClick={e=>e.stopPropagation()}>
          <div style={{ fontSize:50, marginBottom:14 }}>💳</div>
          <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:22, fontWeight:800, marginBottom:10 }}>Abonnement requis</div>
          <div style={{ background:"#052e16", border:"1px solid #14532d", borderRadius:8, padding:12, marginBottom:16, textAlign:"left" }}>
            <div style={{ color:"#4ade80", fontWeight:700, fontSize:13, marginBottom:6 }}>✅ Ce que vous pouvez faire avec votre compte actuel</div>
            <div style={{ fontSize:12, color:"#86efac" }}>• Publier des annonces visibles par les agents PM</div>
            <div style={{ fontSize:12, color:"#86efac" }}>• Recevoir des candidatures spontanées</div>
          </div>
          <div style={{ background:"#1c1006", border:"1px solid #78350f", borderRadius:8, padding:12, marginBottom:16, textAlign:"left" }}>
            <div style={{ color:"#fbbf24", fontWeight:700, fontSize:13, marginBottom:6 }}>🔒 Ce qui nécessite un abonnement</div>
            <div style={{ fontSize:12, color:"#92400e" }}>• Consulter les profils PM disponibles</div>
            <div style={{ fontSize:12, color:"#92400e" }}>• Déverrouiller les coordonnées des agents</div>
            <div style={{ fontSize:12, color:"#92400e" }}>• Alertes légales (engagement de servir 10 877 €)</div>
          </div>
          <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
            <button style={S.btnP} onClick={()=>{setModal(null);setModal({type:"abonnement"})}}>Choisir un abonnement — dès 29 €/mois</button>
            <button style={S.btnG} onClick={()=>setModal(null)}>Plus tard</button>
          </div>
        </div>
      </div>}

      {/* Abonnement */}
      {modal?.type==="abonnement" && <div className="overlay" onClick={()=>setModal(null)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
            <div>
              <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:22, fontWeight:800 }}>💳 Choisissez votre abonnement</div>
              <p style={{ fontSize:12, color:"#4A6080", marginTop:4 }}>Renouvellement mensuel automatique · Résiliation à tout moment</p>
            </div>
            <button style={{ ...S.btnG, padding:"5px 10px" }} onClick={()=>setModal(null)}>✕</button>
          </div>
          <div style={{ display:"flex", justifyContent:"center", gap:0, marginBottom:16 }}>
            {["mensuel","annuel"].map(f=>(
              <button key={f} onClick={()=>setFacturation(f)} style={{ padding:"7px 18px", background:facturation===f?"#1D4ED8":"#0A1628", color:facturation===f?"white":"#94A3B8", border:"1px solid #1E3A5F", cursor:"pointer", fontFamily:"Barlow,sans-serif", fontWeight:600, fontSize:12, borderRadius:f==="mensuel"?"6px 0 0 6px":"0 6px 6px 0" }}>
              {f==="mensuel"?"Mensuel":"Annuel — jusqu'à –17%"}
              </button>
            ))}
          </div>
          <div style={{ display:"grid", gap:10 }}>
            {(() => {
              const plansFiltres = userType === "cdg"
                ? ABONNEMENTS.filter(ab => ab.id.startsWith("cdg"))
                : ABONNEMENTS.filter(ab => {
                    if (ab.id.startsWith("cdg")) return false;
                    // commune_affiliee uniquement si couvert par CDG abonné
                    if (ab.affiliee) return userProfil?.rattachementCDG === "couvert";
                    return true;
                  });
              return plansFiltres.map(ab => {
                const prix = facturation==="annuel" ? Math.round(ab.prixAnnuel/12) : ab.prix;
                const suffixe = facturation==="annuel" ? `${ab.prixAnnuel.toLocaleString("fr-FR")} €/an (−${ab.remisePct}%)` : `${prix} €/mois`;
                return (
                  <div key={ab.id} style={{ background:"#0A1628", border:`2px solid ${ab.color}40`, borderRadius:10, padding:"14px 16px", cursor:"pointer", transition:"all .15s" }}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor=ab.color;e.currentTarget.style.transform="translateX(4px)"}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor=ab.color+"40";e.currentTarget.style.transform="translateX(0)"}}
                    onClick={()=>souscribreAbonnement(ab)}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <div>
                        <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:18, fontWeight:800, color:ab.color }}>{ab.label}</div>
                        <div style={{ fontSize:12, color:"#64748B", marginTop:2 }}>{ab.cible} · {ab.illimite?"Contacts illimités":`${ab.contactsMois} contacts/mois`}</div>
                      </div>
                      <div style={{ textAlign:"right", flexShrink:0 }}>
                        <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:24, fontWeight:800, color:ab.color }}>{prix} €</div>
                        <div style={{ fontSize:10, color:"#4A6080" }}>{suffixe}</div>
                      </div>
                    </div>
                    {ab.id==="essentiel" && (
                      <div style={{ marginTop:8, textAlign:"right" }}>
                        <span style={{ fontSize:10, background:`${ab.color}22`, color:ab.color, padding:"2px 8px", borderRadius:8, fontWeight:700 }}>⭐ Le plus choisi</span>
                      </div>
                    )}
                  </div>
                );
              });
            })()}
          </div>
          {/* Commission */}
          <div style={{ background:"#1c1006", border:"1px solid #78350f", borderRadius:10, padding:"12px 16px", marginTop:12 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:16, fontWeight:700, color:"#F59E0B" }}>Commission recrutement réussi</div>
                <div style={{ fontSize:12, color:"#92400e", marginTop:2 }}>Sans abonnement · Facturation à la mise en poste</div>
              </div>
              <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:22, fontWeight:800, color:"#F59E0B" }}>250 €</div>
            </div>
          </div>
          <p style={{ fontSize:11, color:"#2D4A6A", textAlign:"center", marginTop:12 }}>Paiement sécurisé · Accès immédiat · Sans engagement sur le plan Découverte</p>
        </div>
      </div>}

      {/* Confirmation abonnement — Point 2 */}
      {modal?.type==="confirmer_abonnement" && <div className="overlay" onClick={()=>setModal(null)}>
        <div className="modal" style={{ maxWidth:420, textAlign:"center" }} onClick={e=>e.stopPropagation()}>
          <div style={{ fontSize:40, marginBottom:12 }}>💳</div>
          <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:22, fontWeight:800, marginBottom:8 }}>Confirmer l'abonnement</div>
          <div style={{ background:"#0A1220", border:`1px solid ${modal.ab?.color}40`, borderRadius:10, padding:"14px 20px", marginBottom:16, textAlign:"left" }}>
            <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:20, fontWeight:800, color:modal.ab?.color }}>{modal.ab?.label}</div>
            <div style={{ fontSize:13, color:"#64748B", marginTop:4 }}>{modal.ab?.cible}</div>
            <div style={{ borderTop:"1px solid #1A2E4A", marginTop:12, paddingTop:12, display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, fontSize:12 }}>
              {[
                ["Prix mensuel", `${modal.ab?.prix} €/mois`],
                ["Prix annuel", `${modal.ab?.prixAnnuel} €/an (−${modal.ab?.remisePct}%)`],
                ["Contacts/mois", modal.ab?.illimite ? "Illimités" : `${modal.ab?.contactsMois}`],
                ["Engagement", "Aucun — résiliable à tout moment"],
              ].map(([k,v])=>(
                <div key={k}>
                  <div style={{ color:"#4A6080", fontSize:11 }}>{k}</div>
                  <div style={{ color:"#E2E8F0", fontWeight:600 }}>{v}</div>
                </div>
              ))}
            </div>
          </div>
          <p style={{ fontSize:12, color:"#4A6080", marginBottom:16 }}>Un email de confirmation sera envoyé à <strong style={{ color:"#E2E8F0" }}>{userProfil?.email}</strong>. L'accès est immédiat dès validation.</p>
          <div style={{ display:"flex", gap:10 }}>
            <button style={{ ...S.btnP, flex:1 }} onClick={()=>confirmerAbonnement(modal.ab)}>✅ Confirmer — {modal.ab?.prix} €/mois</button>
            <button style={S.btnG} onClick={()=>setModal(null)}>Annuler</button>
          </div>
        </div>
      </div>}

      {/* Simulation engagement de servir — Action rapide mairie */}
      {modal?.type==="simulation_engagement" && <div className="overlay" onClick={()=>setModal(null)}>
        <div className="modal" style={{ maxWidth:440 }} onClick={e=>e.stopPropagation()}>
          <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:20, fontWeight:800, marginBottom:14 }}>⚖️ Simuler l'engagement de servir</div>
          <p style={{ fontSize:13, color:"#8FA3BB", marginBottom:16, lineHeight:1.6 }}>L'engagement de servir dure 3 ans à compter de la titularisation. En cas de départ anticipé, la commune d'origine peut réclamer un remboursement (max. 10 877 €, dégressif).</p>
          {(() => {
            const [dateTit, setDateTit] = [null, ()=>{}]; // lecture seule démo
            return (
              <div style={{ background:"#0A1220", border:"1px solid #1E3A5F", borderRadius:8, padding:16 }}>
                <div style={{ fontSize:11, color:"#4A6080", marginBottom:12, fontWeight:700 }}>EXEMPLE DE CALCUL</div>
                {[
                  { label:"Titularisation", date:"01/09/2022", moisRestants:5,  remb:1510 },
                  { label:"Titularisation", date:"01/09/2023", moisRestants:17, remb:5136 },
                  { label:"Titularisation", date:"01/09/2024", moisRestants:29, remb:8760 },
                ].map((ex,i)=>(
                  <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:"1px solid #1A2E4A", fontSize:13 }}>
                    <span style={{ color:"#8FA3BB" }}>{ex.date}</span>
                    <span style={{ color:"#fbbf24" }}>{ex.moisRestants} mois restants</span>
                    <span style={{ color:"#fca5a5", fontWeight:700 }}>~{ex.remb.toLocaleString("fr-FR")} €</span>
                  </div>
                ))}
                <div style={{ fontSize:11, color:"#4A6080", marginTop:10 }}>
                  Formule : 10 877 € × (mois restants / 36)
                </div>
              </div>
            );
          })()}
          <button style={{ ...S.btnG, width:"100%", marginTop:14 }} onClick={()=>setModal(null)}>Fermer</button>
        </div>
      </div>}

      {/* Rejet admin */}
      {modal?.type==="rejeter" && <div className="overlay" onClick={()=>setModal(null)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:20, fontWeight:800, color:"#fca5a5", marginBottom:10 }}>❌ Rejeter la demande</div>
          <p style={{ fontSize:13, color:"#8FA3BB", marginBottom:14 }}>Le motif sera communiqué au demandeur pour lui permettre de corriger son dossier.</p>
          <textarea rows={4} placeholder="Ex : Email non institutionnel. Merci d'utiliser votre email @mairie-xxx.fr." value={motifRejet} onChange={e=>setMotifRejet(e.target.value)} style={{ marginBottom:14, resize:"vertical" }} />
          <div style={{ display:"flex", gap:10 }}>
            <button style={{ ...S.btnErr, flex:1, padding:"11px" }} onClick={()=>rejeterMairie(modal.id)}>Confirmer le rejet</button>
            <button style={S.btnG} onClick={()=>{setModal(null);setMotifRejet("")}}>Annuler</button>
          </div>
        </div>
      </div>}

      <footer style={{ borderTop:"1px solid #1A2E4A", padding:"18px 24px", textAlign:"center" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:10, marginBottom:5 }}>
          <span style={{ fontSize:16 }}>🛡️</span>
          <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:15, fontWeight:700, color:"#E2E8F0" }}>PM•EMPLOI</span>
        </div>
        <p style={{ fontSize:11, color:"#2D4A6A" }}>Accès mairies vérifiées · Identités anonymisées · Alertes légales métier · Abonnement mensuel · Conforme RGPD · © 2026 CAPDIM</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
