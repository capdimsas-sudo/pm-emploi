<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PM•EMPLOI — Police Municipale</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
  <style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #070D1A; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const MOCK_OFFICERS = [
      { id: 1, nom: "Dupont", prenom: "Marc", grade: "Brigadier-Chef", annees: 12, commune: "Montpellier (34)", regions: ["Occitanie", "PACA"], specialites: ["Circulation", "Ilotage"], dispo: "Immediate", contact: "m.dupont@pm.fr | 06 12 34 56 78" },
      { id: 2, nom: "Leroy", prenom: "Sophie", grade: "Gardien Principal", annees: 7, commune: "Bordeaux (33)", regions: ["Nouvelle-Aquitaine", "Occitanie"], specialites: ["LAPI", "VTT"], dispo: "3 mois", contact: "s.leroy@pm.fr | 06 98 76 54 32" },
      { id: 3, nom: "Moreau", prenom: "Julien", grade: "Chef de Service", annees: 19, commune: "Lyon (69)", regions: ["AURA", "Bourgogne-FC"], specialites: ["Management", "Juridique", "ATHOS"], dispo: "6 mois", contact: "j.moreau@pm.fr | 06 55 44 33 22" },
      { id: 4, nom: "Bernard", prenom: "Aurelie", grade: "Brigadier", annees: 5, commune: "Nantes (44)", regions: ["Pays de la Loire", "Bretagne"], specialites: ["Mediation", "Scolaire"], dispo: "Immediate", contact: "a.bernard@pm.fr | 06 11 22 33 44" },
      { id: 5, nom: "Petit", prenom: "Thomas", grade: "Directeur de PM", annees: 24, commune: "Toulouse (31)", regions: ["Occitanie", "Nouvelle-Aquitaine"], specialites: ["Direction", "Budget", "RH"], dispo: "6 mois", contact: "t.petit@pm.fr | 06 77 88 99 00" },
      { id: 6, nom: "Garcia", prenom: "Isabelle", grade: "Gardien", annees: 2, commune: "Marseille (13)", regions: ["PACA"], specialites: ["Prevention", "Numerique"], dispo: "Immediate", contact: "i.garcia@pm.fr | 06 33 44 55 66" },
      { id: 7, nom: "Martin", prenom: "Cedric", grade: "Brigadier-Chef", annees: 15, commune: "Strasbourg (67)", regions: ["Grand Est", "Ile-de-France"], specialites: ["Cynophile", "LAPI", "Moto"], dispo: "1 mois", contact: "c.martin@pm.fr | 06 44 55 66 77" },
      { id: 8, nom: "Roux", prenom: "Nathalie", grade: "Gardien Principal", annees: 9, commune: "Nice (06)", regions: ["PACA", "Occitanie"], specialites: ["Tourisme", "Drone"], dispo: "3 mois", contact: "n.roux@pm.fr | 06 22 33 44 55" },
    ];

    const MOCK_DEMANDES = [
      { id: "m1", commune: "Macon", dept: "Saone-et-Loire (71)", siret: "21710278600015", nomContact: "Isabelle Marchand", fonction: "DRH", email: "drh@mairie-macon.fr", tel: "03 85 39 72 00", date: "25/03/2026", statut: "en_attente", justificatif: "Arrete_municipal_PM.pdf" },
      { id: "m2", commune: "Ales", dept: "Gard (30)", siret: "21301003900016", nomContact: "Pierre Vidal", fonction: "Secretaire General", email: "sg@mairie-ales.fr", tel: "04 66 56 22 00", date: "24/03/2026", statut: "en_attente", justificatif: "Delegation_signature.pdf" },
      { id: "m3", commune: "Frejus", dept: "Var (83)", siret: "21830056100014", nomContact: "Marie-Claire Bonnet", fonction: "Maire", email: "maire@ville-frejus.fr", tel: "04 94 51 83 83", date: "23/03/2026", statut: "validee", justificatif: "Mandat_electoral.pdf" },
      { id: "m4", commune: "Inconnu", dept: "???", siret: "00000000000000", nomContact: "user123", fonction: "", email: "contact@gmail.com", tel: "06 00 00 00 00", date: "22/03/2026", statut: "rejetee", justificatif: "", motifRejet: "Email non institutionnel. SIRET invalide. Justificatif absent." },
    ];

    const MOCK_ANNONCES = [
      { id: 1, commune: "Saint-Etienne-de-Saint-Geoirs", dept: "Isere (38)", besoin: 2, grade: "Gardien / Brigadier", urgence: "Urgent", description: "Renforcement du service suite a extension de la ZPS. Poste perenne, logement possible.", date: "24/03/2026", region: "AURA" },
      { id: 2, commune: "Sete", dept: "Herault (34)", besoin: 1, grade: "Chef de Service", urgence: "1 mois", description: "Direction d'un service de 18 agents. Experience management requise. Cadre de vie exceptionnel.", date: "22/03/2026", region: "Occitanie" },
      { id: 3, commune: "Chateauroux", dept: "Indre (36)", besoin: 3, grade: "Tous grades", urgence: "3 mois", description: "Creation d'un nouveau service de PM. Logement fourni, prime d'installation.", date: "20/03/2026", region: "Centre-Val de Loire" },
      { id: 4, commune: "Arcachon", dept: "Gironde (33)", besoin: 2, grade: "Brigadier-Chef", urgence: "Saison estivale", description: "Renfort saisonnier mai-septembre. Specialistes plage/nautique bienvenus.", date: "18/03/2026", region: "Nouvelle-Aquitaine" },
      { id: 5, commune: "Meaux", dept: "Seine-et-Marne (77)", besoin: 4, grade: "Gardien Principal / Brigadier", urgence: "2 mois", description: "Developpement du service, partenariat PN renforce. LAPI et videoprotection apprecies.", date: "15/03/2026", region: "Ile-de-France" },
    ];

    const FORFAITS = [
      { id: "f10", vues: 10, prix: 35, label: "Starter", desc: "Ideal pour un besoin cible", color: "#3B82F6" },
      { id: "f25", vues: 25, prix: 75, label: "Essentiel", desc: "Le plus populaire", color: "#F59E0B", badge: "Populaire" },
      { id: "f50", vues: 50, prix: 100, label: "Premium", desc: "Recrutement intensif", color: "#10B981" },
    ];

    const GRADES = ["Gardien", "Gardien Principal", "Brigadier", "Brigadier-Chef", "Chef de Service", "Directeur de PM", "Autre"];
    const REGIONS = ["Ile-de-France", "AURA", "Occitanie", "PACA", "Nouvelle-Aquitaine", "Pays de la Loire", "Bretagne", "Grand Est", "Normandie", "Hauts-de-France", "Centre-Val de Loire", "Bourgogne-FC", "Corse", "Outre-Mer"];
    const SPECS = ["Circulation / Stationnement", "Ilotage", "LAPI", "Cynophile", "VTT / Moto", "Drone", "ATHOS", "Juridique", "Management / RH", "Mediation", "Prevention scolaire", "Armement", "Videoprotection", "Numerique"];

    const dispoBadge = (d) => {
      if (d === "Immediate") return { bg: "#052e16", color: "#4ade80", dot: "#22c55e" };
      if (d === "1 mois") return { bg: "#1c1917", color: "#fbbf24", dot: "#f59e0b" };
      return { bg: "#1e1b4b", color: "#a5b4fc", dot: "#818cf8" };
    };

    const anonymize = (prenom, nom) => {
      const a = nom.length > 2 ? nom[0] + "*".repeat(nom.length - 2) + nom[nom.length - 1] : nom[0] + "*";
      return { display: prenom[0] + ". " + a, initiales: prenom[0] + nom[0] };
    };

    const isBadEmail = (e) => ["@gmail","@yahoo","@hotmail","@orange","@free.fr","@sfr.fr","@laposte"].some(d => e.includes(d));

    const statutStyle = (s) => {
      if (s === "validee") return { bg: "#052e16", color: "#4ade80", label: "Validee", border: "#14532d" };
      if (s === "rejetee") return { bg: "#450a0a", color: "#fca5a5", label: "Rejetee", border: "#7f1d1d" };
      return { bg: "#1c1917", color: "#fbbf24", label: "En attente", border: "#78350f" };
    };

    function App() {
      const [view, setView] = useState("accueil");
      const [modal, setModal] = useState(null);
      const [unlocked, setUnlocked] = useState(new Set());
      const [viewsLeft, setViewsLeft] = useState(null);
      const [forfait, setForfait] = useState(null);
      const [role, setRole] = useState(null);
      const [verified, setVerified] = useState(false);
      const [officers, setOfficers] = useState(MOCK_OFFICERS);
      const [annonces, setAnnonces] = useState(MOCK_ANNONCES);
      const [demandes, setDemandes] = useState(MOCK_DEMANDES);
      const [fRegion, setFRegion] = useState("Toutes");
      const [fDispo, setFDispo] = useState("Toutes");
      const [notif, setNotif] = useState(null);
      const [pin, setPin] = useState("");
      const [adminOk, setAdminOk] = useState(false);
      const [motifRejet, setMotifRejet] = useState("");
      const [newOfficer, setNewOfficer] = useState({ nom:"", prenom:"", grade:"Gardien", annees:"", commune:"", regions:[], specialites:[], dispo:"Immediate", email:"", tel:"" });
      const [newMairie, setNewMairie] = useState({ commune:"", dept:"", siret:"", nomContact:"", fonction:"", email:"", tel:"", justificatif:"" });

      const notify = (msg, type="success") => { setNotif({msg,type}); setTimeout(()=>setNotif(null),3500); };

      const unlock = (id) => {
        if (!verified) { setModal({type:"nv"}); return; }
        if (!forfait) { setModal({type:"price"}); return; }
        if (viewsLeft <= 0) { setModal({type:"price"}); return; }
        setUnlocked(p => new Set([...p, id]));
        setViewsLeft(v => v-1);
        notify("Contact deverrouille ! Reste : " + (viewsLeft-1) + " vue(s).");
      };

      const buyForfait = (f) => {
        if (!verified) { setModal({type:"nv"}); return; }
        setForfait(f); setViewsLeft(f.vues); setModal(null);
        notify("Forfait " + f.label + " active — " + f.vues + " vues disponibles");
      };

      const saveOfficer = () => {
        if (!newOfficer.nom || !newOfficer.prenom || !newOfficer.email) { notify("Champs obligatoires manquants","error"); return; }
        setOfficers(p => [{ ...newOfficer, id: p.length+1, contact: newOfficer.email+" | "+newOfficer.tel, annees: parseInt(newOfficer.annees)||0 }, ...p]);
        setView("policiers");
        notify("Profil cree ! Votre identite est anonymisee sur la plateforme.");
      };

      const saveMairie = () => {
        if (!newMairie.commune || !newMairie.siret || !newMairie.email || !newMairie.nomContact || !newMairie.fonction) { notify("Champs obligatoires manquants","error"); return; }
        if (isBadEmail(newMairie.email)) { notify("Email non institutionnel refuse","error"); return; }
        if (newMairie.siret.length !== 14) { notify("SIRET doit comporter 14 chiffres","error"); return; }
        setDemandes(p => [{ ...newMairie, id:"m"+(p.length+1), date: new Date().toLocaleDateString("fr-FR"), statut:"en_attente" }, ...p]);
        setRole(null); setView("accueil");
        notify("Demande soumise ! Reponse sous 48h.");
      };

      const valider = (id) => { setDemandes(p => p.map(d => d.id===id ? {...d,statut:"validee"} : d)); setVerified(true); notify("Mairie validee !"); };
      const rejeter = (id) => {
        if (!motifRejet) { notify("Saisissez un motif","error"); return; }
        setDemandes(p => p.map(d => d.id===id ? {...d,statut:"rejetee",motifRejet} : d));
        setMotifRejet(""); setModal(null); notify("Demande rejetee.","error");
      };

      const filtered = officers.filter(o => {
        const rOk = fRegion==="Toutes" || (o.regions||[]).includes(fRegion);
        const dOk = fDispo==="Toutes" || o.dispo===fDispo;
        return rOk && dOk;
      });

      const enAttente = demandes.filter(d => d.statut==="en_attente").length;

      const S = {
        btnP: { background:"linear-gradient(135deg,#1D4ED8,#1E40AF)", color:"white", border:"none", padding:"10px 22px", borderRadius:8, fontFamily:"Barlow,sans-serif", fontWeight:600, fontSize:14, cursor:"pointer" },
        btnG: { background:"transparent", color:"#94A3B8", border:"1px solid #1E3A5F", padding:"9px 20px", borderRadius:8, fontFamily:"Barlow,sans-serif", fontWeight:500, fontSize:14, cursor:"pointer" },
        btnOk: { background:"linear-gradient(135deg,#059669,#047857)", color:"white", border:"none", padding:"8px 18px", borderRadius:8, fontFamily:"Barlow,sans-serif", fontWeight:600, fontSize:13, cursor:"pointer" },
        btnErr: { background:"linear-gradient(135deg,#DC2626,#B91C1C)", color:"white", border:"none", padding:"8px 18px", borderRadius:8, fontFamily:"Barlow,sans-serif", fontWeight:600, fontSize:13, cursor:"pointer" },
        card: { background:"#0D1A2E", border:"1px solid #1A2E4A", borderRadius:12 },
        inp: { background:"#0A1628", border:"1px solid #1E3A5F", color:"#E2E8F0", padding:"10px 14px", borderRadius:8, fontFamily:"Barlow,sans-serif", fontSize:14, width:"100%", outline:"none" },
        chip: (bg,color,border) => ({ display:"inline-flex", alignItems:"center", gap:4, padding:"4px 10px", borderRadius:20, fontSize:11, fontWeight:600, background:bg, color, border:`1px solid ${border||bg}` }),
      };

      return (
        <div style={{ fontFamily:"'Barlow',sans-serif", background:"#070D1A", minHeight:"100vh", color:"#E8ECF0" }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap');
            * { box-sizing:border-box; margin:0; padding:0; }
            ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:#0D1525} ::-webkit-scrollbar-thumb{background:#1E3A5F;border-radius:3px}
            input,select,textarea{background:#0A1628;border:1px solid #1E3A5F;color:#E2E8F0;padding:10px 14px;border-radius:8px;font-family:'Barlow',sans-serif;font-size:14px;width:100%;outline:none}
            input:focus,select:focus,textarea:focus{border-color:#3B82F6}
            input::placeholder,textarea::placeholder{color:#4A6080}
            select option{background:#0D1A2E}
            label{font-size:13px;color:#8FA3BB;font-weight:500;display:block;margin-bottom:5px}
            .navlink{cursor:pointer;padding:6px 14px;border-radius:6px;transition:all .15s;font-weight:500;font-size:14px;color:#8FA3BB}
            .navlink:hover{background:#0D1A2E;color:#60A5FA}
            .navlink.act{background:#1E3A5F;color:#60A5FA}
            .overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
            .modal{background:#0D1A2E;border:1px solid #1E3A5F;border-radius:16px;padding:32px;max-width:560px;width:90%;max-height:88vh;overflow-y:auto}
            .toast{position:fixed;bottom:24px;right:24px;z-index:200;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:500;max-width:360px}
            .tag{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #1E3A5F;background:#0A1628;color:#64748B}
            .tag.sel{background:#1E3A5F;color:#60A5FA;border-color:#2D5A8E}
            .fr{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
            @media(max-width:600px){.fr{grid-template-columns:1fr}}
          `}</style>

          {/* Tricolore */}
          <div style={{ height:3, background:"linear-gradient(90deg,#002395 33.33%,white 33.33%,white 66.66%,#ED2939 66.66%)" }} />

          {/* Header */}
          <header style={{ background:"#070D1A", borderBottom:"1px solid #1A2E4A", padding:"0 24px", position:"sticky", top:0, zIndex:50 }}>
            <div style={{ maxWidth:1100, margin:"0 auto", height:58, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div style={{ display:"flex", alignItems:"center", gap:12, cursor:"pointer" }} onClick={()=>setView("accueil")}>
                <div style={{ width:36, height:36, background:"linear-gradient(135deg,#1D4ED8,#1E40AF)", borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>&#x1F6E1;&#xFE0F;</div>
                <div>
                  <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:17, fontWeight:800, color:"#E2E8F0", lineHeight:1 }}>PM&#x2022;EMPLOI</div>
                  <div style={{ fontSize:10, color:"#4A6080", letterSpacing:"1.5px", fontWeight:500 }}>POLICE MUNICIPALE</div>
                </div>
              </div>
              <nav style={{ display:"flex", gap:4, alignItems:"center" }}>
                {[["accueil","Accueil"],["policiers","Policiers"],["annonces","Annonces"],["tarifs","Tarifs"]].map(([v,l]) => (
                  <div key={v} className={"navlink"+(view===v?" act":"")} onClick={()=>setView(v)}>{l}</div>
                ))}
                <div className={"navlink"+(view==="admin"?" act":"")} style={{ color:view==="admin"?"#F59E0B":"#4A6080", position:"relative" }} onClick={()=>setView("admin")}>
                  Admin {enAttente>0 && <span style={{ position:"absolute", top:2, right:2, width:8, height:8, background:"#EF4444", borderRadius:"50%", border:"1px solid #070D1A" }} />}
                </div>
              </nav>
              <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                {verified && <span style={{ display:"inline-flex", alignItems:"center", gap:5, background:"#052e16", border:"1px solid #14532d", color:"#4ade80", padding:"3px 10px", borderRadius:20, fontSize:11, fontWeight:700 }}>Mairie verifiee</span>}
                <button style={S.btnG} onClick={()=>{setRole("policier");setView("inscription")}}>Inscription Policier</button>
                <button style={S.btnP} onClick={()=>{setRole("mairie");setView("inscription")}}>Espace Mairie</button>
              </div>
            </div>
          </header>

          {notif && <div className="toast" style={{ background:notif.type==="error"?"#450a0a":"#052e16", border:`1px solid ${notif.type==="error"?"#7f1d1d":"#14532d"}`, color:notif.type==="error"?"#fca5a5":"#86efac" }}>{notif.type==="error"?"⚠":"✅"} {notif.msg}</div>}

          <main style={{ maxWidth:1100, margin:"0 auto", padding:"0 24px 60px" }}>

            {/* ACCUEIL */}
            {view==="accueil" && <div>
              <div style={{ textAlign:"center", padding:"72px 24px 56px", background:"radial-gradient(ellipse at 50% 0%,rgba(29,78,216,.14) 0%,transparent 60%)", borderBottom:"1px solid #1A2E4A" }}>
                <div style={{ display:"inline-flex", alignItems:"center", gap:8, background:"#0D1A2E", border:"1px solid #1E3A5F", borderRadius:20, padding:"4px 16px", fontSize:12, color:"#60A5FA", marginBottom:24, fontWeight:700, letterSpacing:"1px" }}>
                  PLATEFORME NATIONALE - ACCES RESERVE
                </div>
                <h1 style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:"clamp(42px,7vw,70px)", fontWeight:800, lineHeight:1.05, letterSpacing:"-1px", marginBottom:20 }}>
                  La mobilite de la<br /><span style={{ color:"#3B82F6" }}>Police Municipale</span>
                </h1>
                <p style={{ fontSize:16, color:"#8FA3BB", maxWidth:520, margin:"0 auto 20px", lineHeight:1.7 }}>
                  Plateforme securisee : agents anonymises, acces reserve aux communes officiellement verifiees.
                </p>
                <div style={{ display:"inline-flex", gap:24, background:"#0D1A2E", border:"1px solid #1A2E4A", borderRadius:12, padding:"12px 28px", marginBottom:36, flexWrap:"wrap", justifyContent:"center" }}>
                  {["Identites anonymisees","Mairies verifiees","Acces controle"].map(t=><span key={t} style={{ fontSize:13, color:"#60A5FA", fontWeight:600 }}>{t}</span>)}
                </div>
                <div style={{ display:"flex", gap:12, justifyContent:"center", flexWrap:"wrap" }}>
                  <button style={S.btnP} onClick={()=>{setRole("policier");setView("inscription")}}>Je suis policier municipal</button>
                  <button style={{...S.btnG,borderColor:"#2D5A8E"}} onClick={()=>{setRole("mairie");setView("inscription")}}>Je represente une mairie</button>
                </div>
              </div>

              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))", gap:16, padding:"40px 0 24px" }}>
                {[
                  { color:"#3B82F6", titre:"Anonymat des policiers", texte:"Les noms sont masques (ex : M. D***t). Seule une mairie verifiee avec forfait actif peut acceder aux coordonnees." },
                  { color:"#F59E0B", titre:"Verification des mairies", texte:"SIRET + email institutionnel + justificatif officiel. Validation manuelle sous 48h par l'equipe PM-EMPLOI." },
                  { color:"#10B981", titre:"Double barriere d'acces", texte:"Verification officielle + forfait payant = 2 conditions cumulatives. Protection totale des agents." },
                ].map(({color,titre,texte})=>(
                  <div key={titre} style={{...S.card, padding:22, borderLeft:`3px solid ${color}`}}>
                    <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:18, fontWeight:700, color:"#E2E8F0", marginBottom:8 }}>{titre}</div>
                    <p style={{ fontSize:13, color:"#64748B", lineHeight:1.7 }}>{texte}</p>
                  </div>
                ))}
              </div>

              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))", gap:14, paddingBottom:40 }}>
                {[["officers.length","Agents inscrits"],["annonces.length","Annonces actives"],["demandes.filter(d=>d.statut==='validee').length","Mairies verifiees"],["48h","Delai verification"]].map(([val,lab],i)=>(
                  <div key={lab} style={{ background:"linear-gradient(135deg,#0D1A2E,#0A1628)", border:"1px solid #1A2E4A", borderRadius:12, padding:"20px 24px", textAlign:"center" }}>
                    <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:34, fontWeight:800, color:"#60A5FA" }}>
                      {i===0?officers.length:i===1?annonces.length:i===2?demandes.filter(d=>d.statut==="validee").length:"48h"}
                    </div>
                    <div style={{ fontSize:12, color:"#4A6080", marginTop:4 }}>{lab}</div>
                  </div>
                ))}
              </div>
            </div>}

            {/* POLICIERS */}
            {view==="policiers" && <div style={{ paddingTop:36 }}>
              <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:16, flexWrap:"wrap", gap:12 }}>
                <div>
                  <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:28, fontWeight:800 }}>Policiers disponibles</div>
                  <p style={{ color:"#4A6080", fontSize:14, marginTop:4 }}>{filtered.length} profil(s) - Identites anonymisees</p>
                </div>
                <div style={{ display:"flex", gap:10, flexWrap:"wrap", alignItems:"center" }}>
                  {forfait && verified && <div style={{ background:"#052e16", border:"1px solid #14532d", borderRadius:8, padding:"6px 14px", fontSize:13, color:"#86efac", fontWeight:600 }}>{viewsLeft} vue(s) restante(s)</div>}

                      <div key={d.id} style={{...S.card, padding:"20px 24px", borderLeft:`3px solid ${d.statut==="validee"?"#22c55e":d.statut==="rejetee"?"#EF4444":"#F59E0B"}`}}>

                            </div>

                <div className="fr" style={{ marginTop:14 }}>
                  <div><label>Email * (confidentiel)</label><input type="email" placeholder="jean.dupont@mairie.fr" value={newOfficer.email} onChange={e=>setNewOfficer(p=>({...p,email:e.target.value}))} /></div>
                  <div><label>Telephone (confidentiel)</label><input placeholder="06 00 00 00 00" value={newOfficer.tel} onChange={e=>setNewOfficer(p=>({...p,tel:e.target.value}))} /></div>

                  <input placeholder="Ex : Arrete_PM_2026.pdf" value={newMairie.justificatif} onChange={e=>setNewMairie(p=>({...p,justificatif:e.target.value}))} />
                </div>
                <div style={{ background:"#0A1220", border:"1px solid #1E3A5F", borderRadius:8, padding:"12px 16px", marginBottom:20, fontSize:13, color:"#8FA3BB" }}>
                  En soumettant, vous certifiez agir au nom d'une collectivite territoriale francaise. Toute usurpation sera signalee aux autorites.
                </div>
                <div style={{ display:"flex", gap:10 }}>
                  <button style={{...S.btnP, flex:1, padding:"12px"}} onClick={saveMairie}>Soumettre le dossier</button>
                  <button style={S.btnG} onClick={()=>setView("accueil")}>Annuler</button>
                </div>
              </div>
            </div>}
          </main>

          {/* MODALS */}
          {modal && modal.type==="nv" && <div className="overlay" onClick={()=>setModal(null)}>
            <div className="modal" style={{ textAlign:"center" }} onClick={e=>e.stopPropagation()}>
              <div style={{ fontSize:52, marginBottom:16 }}>&#x1F512;</div>
              <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:24, fontWeight:800, marginBottom:10 }}>Acces restreint</div>
              <p style={{ color:"#8FA3BB", fontSize:14, lineHeight:1.7, marginBottom:24 }}>L'acces aux profils est reserve aux communes officiellement verifiees. Cette restriction protege les agents contre tout contact malveillant.</p>
              <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
                <button style={S.btnP} onClick={()=>{setModal(null);setRole("mairie");setView("inscription")}}>Deposer un dossier</button>
                <button style={S.btnG} onClick={()=>setModal(null)}>Fermer</button>
              </div>
            </div>
          </div>}

          {modal && modal.type==="price" && <div className="overlay" onClick={()=>setModal(null)}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
                <div>
                  <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:24, fontWeight:800 }}>Choisissez un forfait</div>
                  <p style={{ fontSize:13, color:"#4A6080", marginTop:4 }}>1 vue = 1 contact deverrouille</p>
                </div>
                <button style={S.btnG} onClick={()=>setModal(null)}>X</button>
              </div>
              <div style={{ display:"grid", gap:14 }}>
                {FORFAITS.map(f=>(
                  <div key={f.id} style={{ background:"#0A1628", border:`2px solid ${f.color}40`, borderRadius:12, padding:"18px 20px", cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center" }}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor=f.color}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor=f.color+"40"}}
                    onClick={()=>buyForfait(f)}>
                    <div>
                      <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:22, fontWeight:800, color:f.color }}>{f.label}</div>
                      <div style={{ fontSize:13, color:"#64748B" }}>{f.vues} contacts - {f.desc}</div>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:28, fontWeight:800, color:f.color }}>{f.prix}&euro;</div>
                      <div style={{ fontSize:11, color:"#4A6080" }}>HT</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>}

          {modal && modal.type==="rejeter" && <div className="overlay" onClick={()=>setModal(null)}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
              <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:22, fontWeight:800, color:"#fca5a5", marginBottom:10 }}>Rejeter la demande</div>
              <p style={{ fontSize:13, color:"#8FA3BB", marginBottom:16 }}>Le motif sera communique au demandeur.</p>
              <textarea rows={4} placeholder="Ex : Email non institutionnel. SIRET a verifier." value={motifRejet} onChange={e=>setMotifRejet(e.target.value)} style={{ marginBottom:16 }} />
              <div style={{ display:"flex", gap:10 }}>
                <button style={{...S.btnErr, flex:1, padding:"11px"}} onClick={()=>rejeter(modal.id)}>Confirmer le rejet</button>
                <button style={S.btnG} onClick={()=>{setModal(null);setMotifRejet("");}}>Annuler</button>
              </div>
            </div>
          </div>}

          <footer style={{ borderTop:"1px solid #1A2E4A", padding:"20px 24px", textAlign:"center" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:10, marginBottom:6 }}>
              <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:16, fontWeight:700, color:"#E2E8F0" }}>PM&#x2022;EMPLOI</span>
            </div>
            <p style={{ fontSize:12, color:"#2D4A6A" }}>Acces reserve aux mairies verifiees - Identites anonymisees - Conforme RGPD - 2026</p>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
